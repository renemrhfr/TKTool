</script>
<script data-source="./js/meetings.js">
// ============================================================
// MEETINGS VIEW
// ============================================================
function meetingDisplayTitle(m) {
  return esc(meetingTitleText(m));
}

function openMeetingDetail(id) {
  navigate('meetings:detail', { meetingId: id });
}

function setMeetingQuery(value) {
  const input = document.getElementById('meetingSearchInput');
  pendingMeetingSearchSelection = input
    ? { start: input.selectionStart, end: input.selectionEnd }
    : { start: value.length, end: value.length };
  viewState.meetingQuery = value;
  render();
}

function setMeetingRangeFilter(value) {
  viewState.meetingRange = value;
  render();
}

function parsePrepBullets(prep) {
  if (!prep) return [];
  const bullets = [];
  let current = null;
  const push = () => { if (current) bullets.push(current); };
  for (const raw of prep.split('\n')) {
    const line = raw.replace(/\s+$/, '');
    const mDone = line.match(/^\s*-\s*\[x\](?:\s+(.*))?$/i);
    if (mDone) { push(); current = { text: mDone[1] || '', done: true }; continue; }
    const mOpen = line.match(/^\s*-\s*\[\s?\](?:\s+(.*))?$/);
    if (mOpen) { push(); current = { text: mOpen[1] || '', done: false }; continue; }
    const mDash = line.match(/^\s*[-*](?:\s+(.*))?$/);
    if (mDash) { push(); current = { text: mDash[1] || '', done: false }; continue; }
    if (current) {
      current.text += '\n' + line.replace(/^\s{1,4}/, '');
    } else if (line.trim()) {
      current = { text: line.trim(), done: false };
    }
  }
  push();
  return bullets;
}

function serializePrepBullets(bullets) {
  return bullets.map(b => {
    const prefix = b.done ? '- [x] ' : '- ';
    const [first, ...rest] = (b.text || '').split('\n');
    const cont = rest.map(l => '  ' + l).join('\n');
    return prefix + first + (cont ? '\n' + cont : '');
  }).join('\n');
}

function meetingRelativeDate(d) {
  if (!d) return '';
  const today = todayStr();
  if (d === today) return 'heute';
  if (d === dateShift(today, 1)) return 'morgen';
  if (d === dateShift(today, -1)) return 'gestern';
  const diff = Math.round((parseISO(d) - parseISO(today)) / 86400000);
  if (diff > 1 && diff <= 7) return `in ${diff} Tagen`;
  if (diff < -1 && diff >= -7) return `vor ${-diff} Tagen`;
  return formatDate(d);
}

function meetingFollowupCounts(id) {
  const items = meetingItems(id);
  const counts = { todo: 0, waiting: 0, done: 0, backlog: 0, total: items.length };
  items.forEach(i => { if (counts[i.status] !== undefined) counts[i.status]++; });
  return counts;
}

function meetingMonthKey(meeting) {
  return meeting.date ? meeting.date.slice(0, 7) : 'ohne-datum';
}

function meetingMonthLabel(key) {
  return key === 'ohne-datum' ? 'ohne datum' : formatMonth(key).toLocaleLowerCase('de-AT');
}

function meetingListExcerpt(m, query) {
  const linkedItems = data.items
    .filter(item => item.meetingId === m.id)
    .flatMap(item => [item.text, item.notes]);
  const source = [m.notes, m.prep, ...linkedItems].filter(Boolean).join(' ');
  if (!source) return '';
  const compact = String(source).replace(/\s+/g, ' ').trim();
  if (!query) return previewText(compact, 110);
  const idx = compact.toLocaleLowerCase('de-AT').indexOf(query);
  if (idx < 0) return previewText(compact, 110);
  const start = Math.max(0, idx - 36);
  const end = Math.min(compact.length, idx + query.length + 74);
  return `${start ? '...' : ''}${compact.slice(start, end).trim()}${end < compact.length ? '...' : ''}`;
}

function meetingHasOpenFollowups(meeting) {
  const counts = meetingFollowupCounts(meeting.id);
  return counts.todo + counts.waiting + counts.backlog > 0;
}

function meetingMatchesRange(meeting, range, today) {
  if (range === 'upcoming') return !meeting.date || meeting.date >= today;
  if (range === 'past') return meeting.date && meeting.date < today;
  if (range === 'open') return meetingHasOpenFollowups(meeting);
  if (range === 'undated') return !meeting.date;
  return true;
}

function groupMeetingsByTimeline(meetings, today) {
  const in7 = dateShift(today, 7);
  const in30 = dateShift(today, 30);
  const groups = { heute: [], diese: [], monat: [], spaeter: [], ohneDatum: [], vergangen: {} };
  meetings.forEach(m => {
    if (!m.date) { groups.ohneDatum.push(m); return; }
    if (m.date === today) groups.heute.push(m);
    else if (m.date < today) {
      const key = meetingMonthKey(m);
      if (!groups.vergangen[key]) groups.vergangen[key] = [];
      groups.vergangen[key].push(m);
    }
    else if (m.date <= in7) groups.diese.push(m);
    else if (m.date <= in30) groups.monat.push(m);
    else groups.spaeter.push(m);
  });
  groups.heute.sort((a, b) => (a.date || '').localeCompare(b.date || ''));
  groups.diese.sort((a, b) => a.date.localeCompare(b.date));
  groups.monat.sort((a, b) => a.date.localeCompare(b.date));
  groups.spaeter.sort((a, b) => a.date.localeCompare(b.date));
  groups.ohneDatum.sort((a, b) => meetingTitleText(a).localeCompare(meetingTitleText(b), 'de-AT'));
  Object.values(groups.vergangen).forEach(entries => entries.sort((a, b) => (b.date || '').localeCompare(a.date || '')));
  return groups;
}

function flattenMeetingGroups(groups) {
  const pastKeys = Object.keys(groups.vergangen).sort((a, b) => b.localeCompare(a));
  return [
    ...groups.heute,
    ...groups.diese,
    ...groups.monat,
    ...groups.spaeter,
    ...groups.ohneDatum,
    ...pastKeys.flatMap(key => groups.vergangen[key]),
  ];
}

function renderMeetingListRow(m, isActive, query = '') {
  const counts = meetingFollowupCounts(m.id);
  const person = m.personId ? data.persons.find(p => p.id === m.personId) : null;
  const participants = meetingParticipants(m);
  const openTodos = counts.todo + counts.waiting;
  const teamMeeting = isTeamMeeting(m);
  const excerpt = meetingListExcerpt(m, query);
  const date = m.date ? new Date(`${m.date}T12:00:00`) : null;
  const day = date ? String(date.getDate()).padStart(2, '0') : '--';
  const weekday = date ? date.toLocaleDateString('de-AT', { weekday: 'short' }).replace('.', '') : '';
  const peekBits = [];
  if (participants.length) peekBits.push(participants.map(p => p.name).join(', '));
  if (m.notes) peekBits.push(previewText(m.notes));
  const peek = peekBits.join('\n\n');
  return `
    <div class="meeting-list-row ${isActive ? 'active' : ''}"
         onclick="openMeetingDetail('${m.id}')"
         role="button" tabindex="0"
         onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();openMeetingDetail('${m.id}')}"
         ${peek ? `data-peek="${esc(peek)}"` : ''}>
      <div class="meeting-list-datebox">
        <span class="meeting-list-datebox-day">${day}</span>
        <span class="meeting-list-datebox-weekday">${weekday ? esc(weekday) : '--'}</span>
      </div>
      <div class="meeting-list-main">
        <div class="meeting-list-head">
          <span class="meeting-list-type">${m.type === 'oneOnOne' ? '1:1' : (teamMeeting ? 'team' : 'mtg')}</span>
          <span class="meeting-list-title">${meetingDisplayTitle(m)}</span>
          ${(openTodos || counts.done) ? `<span class="meeting-list-followups">
            ${openTodos ? `<span class="badge badge-todo">${openTodos}</span>` : ''}
            ${counts.done ? `<span class="badge badge-done">${counts.done}</span>` : ''}
          </span>` : ''}
        </div>
        <div class="meeting-list-meta">
          ${person && m.type !== 'oneOnOne' ? `<span class="meeting-list-person">@${esc(person.name)}</span>` : ''}
          ${participants.length && !person && teamMeeting ? `<span class="meeting-list-count">${participants.length}p</span>` : ''}
        </div>
        ${excerpt ? `<div class="meeting-list-excerpt">${esc(excerpt)}</div>` : ''}
      </div>
    </div>
  `;
}

function renderMeetingListGroup(label, meetings, selectedId, query = '') {
  if (!meetings.length) return '';
  return `
    <div class="meeting-list-group">
      <div class="meeting-list-group-label">${label} <span class="meeting-list-group-count">${meetings.length}</span></div>
      ${meetings.map(m => renderMeetingListRow(m, m.id === selectedId, query)).join('')}
    </div>
  `;
}

function renderMeetings() {
  const filter = viewState.meetingFilter || 'all';
  const range = viewState.meetingRange || 'all';
  const rawQuery = viewState.meetingQuery || '';
  const query = rawQuery.trim().toLocaleLowerCase('de-AT');
  const today = todayStr();

  let meetings = [...data.meetings];
  if (filter === 'oneOnOne') meetings = meetings.filter(m => m.type === 'oneOnOne');
  else if (filter === 'team') meetings = meetings.filter(m => isTeamMeeting(m));
  else if (filter === 'other') meetings = meetings.filter(m => m.type !== 'oneOnOne' && !isTeamMeeting(m));
  if (range !== 'all') meetings = meetings.filter(m => meetingMatchesRange(m, range, today));
  if (query) meetings = meetings.filter(m => meetingMatchesQuery(m, query));

  const groups = groupMeetingsByTimeline(meetings, today);
  const ordered = flattenMeetingGroups(groups);

  const selectedId = currentView === 'meetings:detail' && ordered.some(m => m.id === viewState.meetingId)
    ? viewState.meetingId
    : null;
  const selected = selectedId ? data.meetings.find(m => m.id === selectedId) : null;

  const totalCount = data.meetings.length;
  const oneOnOneCount = data.meetings.filter(m => m.type === 'oneOnOne').length;
  const teamCount = data.meetings.filter(m => isTeamMeeting(m)).length;
  const openFollowupCount = data.meetings.filter(meetingHasOpenFollowups).length;
  const pastKeys = Object.keys(groups.vergangen).sort((a, b) => b.localeCompare(a));
  const meetingListContent = `
    <div class="meetings-sidebar-controls">
      <div class="meetings-sidebar-head">
        <div class="meetings-result-line">
          <span>${ordered.length}</span>
          <strong>/ ${totalCount}</strong>
          <em>${query ? 'treffer' : 'sichtbar'}</em>
        </div>
        <div class="meetings-sidebar-stats">
          <span>${oneOnOneCount} 1:1</span>
          <span>${teamCount} team</span>
          <span>${openFollowupCount} offen</span>
        </div>
      </div>
      <div class="meeting-range-tabs">
        <button class="${range === 'all' ? 'active' : ''}" onclick="setMeetingRangeFilter('all')">alle</button>
        <button class="${range === 'upcoming' ? 'active' : ''}" onclick="setMeetingRangeFilter('upcoming')">kommend</button>
        <button class="${range === 'past' ? 'active' : ''}" onclick="setMeetingRangeFilter('past')">historie</button>
        <button class="${range === 'open' ? 'active' : ''}" onclick="setMeetingRangeFilter('open')">offen</button>
        <button class="${range === 'undated' ? 'active' : ''}" onclick="setMeetingRangeFilter('undated')">ohne datum</button>
      </div>
    </div>
    ${ordered.length ? `
      ${renderMeetingListGroup('heute', groups.heute, selectedId, query)}
      ${renderMeetingListGroup('nächste 7 tage', groups.diese, selectedId, query)}
      ${renderMeetingListGroup('nächste 30 tage', groups.monat, selectedId, query)}
      ${renderMeetingListGroup('später', groups.spaeter, selectedId, query)}
      ${renderMeetingListGroup('ohne datum', groups.ohneDatum, selectedId, query)}
      ${pastKeys.map(key => renderMeetingListGroup(meetingMonthLabel(key), groups.vergangen[key], selectedId, query)).join('')}
    ` : `<div class="meetings-sidebar-empty">${query ? 'keine treffer' : 'keine meetings'}</div>`}
  `;

  return `
    <div class="section-header">
      <div class="overview-toolbar">
        <span class="section-title">Meetings</span>
        <div class="view-search">
          <input
            id="meetingSearchInput"
            type="search"
            placeholder="grep: titel, notizen, prep, personen..."
            value="${esc(rawQuery)}"
            oninput="setMeetingQuery(this.value)"
          >
        </div>
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-primary btn-sm" onclick="openMeetingForm('meeting')">+ Meeting</button>
        <button class="btn btn-primary btn-sm" onclick="openMeetingForm('oneOnOne')">+ 1:1</button>
      </div>
    </div>

    <div class="filters">
      <button class="filter-btn ${filter === 'all' ? 'active' : ''}" onclick="setMeetingTypeFilter('all')">alle</button>
      <button class="filter-btn ${filter === 'oneOnOne' ? 'active' : ''}" onclick="setMeetingTypeFilter('oneOnOne')">1:1s</button>
      <button class="filter-btn ${filter === 'team' ? 'active' : ''}" onclick="setMeetingTypeFilter('team')">team</button>
      <button class="filter-btn ${filter === 'other' ? 'active' : ''}" onclick="setMeetingTypeFilter('other')">sonstige</button>
    </div>

    ${totalCount ? `
      ${selected ? `
        <div class="meetings-layout">
          <aside class="meetings-sidebar card">
            ${meetingListContent}
          </aside>
          <section class="meetings-detail-panel card">
            <div class="meetings-detail-header">
              <div class="meetings-detail-title-row">
                <span class="section-title">${meetingDisplayTitle(selected)}</span>
                <span class="meetings-detail-date">${selected.date ? meetingRelativeDate(selected.date) : 'ohne Datum'}</span>
              </div>
              <div class="meetings-detail-actions">
                ${selected.personId ? `<button class="btn btn-secondary btn-sm" onclick="openPersonById('${selected.personId}')">@${esc(personName(selected.personId))}</button>` : ''}
                ${selected.type !== 'oneOnOne' ? `<label class="btn btn-secondary btn-sm" style="display:inline-flex;align-items:center;gap:6px;cursor:pointer"><input type="checkbox" ${isTeamMeeting(selected) ? 'checked' : ''} onchange="toggleMeetingTeamFlag('${selected.id}', this.checked)" style="margin:0"><span>Team</span></label>` : ''}
                ${selected.type !== 'oneOnOne' ? `<button class="btn btn-secondary btn-sm" onclick="openMeetingTitleForm('${selected.id}')">Titel bearbeiten</button>` : ''}
                ${selected.type === 'oneOnOne' && !selected.date ? `<button class="btn btn-secondary btn-sm" onclick="openScheduleMeetingDate('${selected.id}')">Einplanen</button>` : ''}
                <button class="btn btn-primary btn-sm" onclick="openMeetingFollowUp('${selected.id}')">+ Follow-up</button>
                <button class="btn btn-secondary btn-sm" onclick="exportMeeting('${selected.id}')">Export .md</button>
                <button class="btn btn-secondary btn-sm" onclick="deleteMeeting('${selected.id}')">Löschen</button>
              </div>
            </div>
            ${renderMeetingDetailBody(selected)}
          </section>
        </div>
      ` : `
        <section class="meetings-list-panel card">
          ${meetingListContent}
        </section>
      `}
    ` : `
      <div class="empty-state">
        <div class="empty-state-icon">&#128197;</div>
        <div class="empty-state-text">Noch keine Meetings</div>
      </div>
    `}
  `;
}

function setMeetingTypeFilter(value) {
  viewState.meetingFilter = value;
  render();
}

// ============================================================
// MEETING DETAIL
// ============================================================
function renderMeetingDetail() {
  const m = data.meetings.find(m => m.id === viewState.meetingId);
  if (!m) return '<div>Meeting nicht gefunden</div>';
  return `
    <button class="back-btn" onclick="navigate('meetings')">&#8592; Zurück</button>

    <div class="section-header">
      <span class="section-title">${meetingDisplayTitle(m)}</span>
      <div style="display:flex;gap:8px">
        ${m.personId ? `<button class="btn btn-secondary btn-sm" onclick="openPersonById('${m.personId}')">@${esc(personName(m.personId))}</button>` : ''}
        ${m.type !== 'oneOnOne' ? `<label class="btn btn-secondary btn-sm" style="display:inline-flex;align-items:center;gap:6px;cursor:pointer"><input type="checkbox" ${isTeamMeeting(m) ? 'checked' : ''} onchange="toggleMeetingTeamFlag('${m.id}', this.checked)" style="margin:0"><span>Team</span></label>` : ''}
        ${m.type !== 'oneOnOne' ? `<button class="btn btn-secondary btn-sm" onclick="openMeetingTitleForm('${m.id}')">Titel bearbeiten</button>` : ''}
        <button class="btn btn-primary btn-sm" onclick="openMeetingFollowUp('${m.id}')">+ Follow-up</button>
        <span style="color:var(--text-muted);font-size:14px;line-height:32px">${m.date ? formatDate(m.date) : 'ohne Datum'}</span>
        ${m.type === 'oneOnOne' && !m.date ? `<button class="btn btn-secondary btn-sm" onclick="openScheduleMeetingDate('${m.id}')">Einplanen</button>` : ''}
        <button class="btn btn-secondary btn-sm" onclick="exportMeeting('${m.id}')">Export .md</button>
        <button class="btn btn-secondary btn-sm" onclick="deleteMeeting('${m.id}')">Löschen</button>
      </div>
    </div>
    ${renderMeetingDetailBody(m)}
  `;
}

function meetingStatusExpanded() {
  return viewState.meetingStatusCollapsed === false;
}

function toggleMeetingStatusSection() {
  viewState.meetingStatusCollapsed = meetingStatusExpanded() ? true : false;
  render();
}

function renderMeetingStatusSection(m) {
  if (!isTeamMeeting(m) && m.type !== 'oneOnOne') return '';
  const content = renderMeetingTeamStatus(m);
  if (!content) return '';
  const expanded = meetingStatusExpanded();
  return `
    <div class="meeting-section-card ${expanded ? 'is-expanded' : 'is-collapsed'}">
      <button class="meeting-section-toggle" onclick="toggleMeetingStatusSection()" aria-expanded="${expanded ? 'true' : 'false'}">
        <span>Planung / Status</span>
        <span class="meeting-section-toggle-icon" aria-hidden="true">${expanded ? '&#8722;' : '+'}</span>
      </button>
      ${expanded ? `<div class="meeting-section-content">${content}</div>` : ''}
    </div>
  `;
}

function renderCarryoverSignal(item) {
  const tone = item.type === 'concern' ? 'concern' : 'highlight';
  const label = item.type === 'concern' ? 'concern' : 'win';
  return `
    <button class="oneonone-carryover-signal oneonone-carryover-signal-${tone}" onclick="openEditItem('${item.id}')">
      <span class="oneonone-carryover-date">${formatDateShort(item.date) || '&ndash;'}</span>
      <span class="badge badge-${item.type}">${label}</span>
      <span class="oneonone-carryover-text">${esc(item.text)}</span>
    </button>
  `;
}

function renderOneOnOneCarryover(m) {
  const person = m.personId ? data.persons.find(p => p.id === m.personId) : null;
  if (m.type !== 'oneOnOne' || !person) return '';
  const carryover = oneOnOneCarryover(m);
  const total = carryoverCount(carryover);
  const empty = '<div class="oneonone-carryover-empty">Nichts offen</div>';
  return `
    <div class="meeting-detail-section meeting-detail-section-emphasis oneonone-carryover">
      <div class="oneonone-carryover-head">
        <h3>Übernahme</h3>
        <span class="oneonone-carryover-count">${total} Signale</span>
      </div>
      <div class="oneonone-carryover-grid">
        <div class="oneonone-carryover-column oneonone-carryover-column-followups">
          <div class="oneonone-carryover-title">Offene Follow-ups</div>
          ${carryover.openFollowUps.length
            ? `<ul class="item-list oneonone-carryover-list">${carryover.openFollowUps.map(item => renderItem(item, false, { compact: true })).join('')}</ul>`
            : empty}
        </div>
        <div class="oneonone-carryover-column oneonone-carryover-column-todos">
          <div class="oneonone-carryover-title">Todos</div>
          ${carryover.openTodos.length
            ? `<ul class="item-list oneonone-carryover-list">${carryover.openTodos.map(item => renderItem(item, false, { compact: true })).join('')}</ul>`
            : empty}
        </div>
        <div class="oneonone-carryover-column oneonone-carryover-column-signals">
          <div class="oneonone-carryover-title">Concerns / Wins seit letztem 1:1</div>
          ${carryover.recentSignals.length
            ? `<div class="oneonone-carryover-signals">${carryover.recentSignals.map(renderCarryoverSignal).join('')}</div>`
            : '<div class="oneonone-carryover-empty">Noch keine Signale</div>'}
        </div>
      </div>
    </div>
  `;
}

function renderMeetingDetailBody(m) {
  const linkedItems = meetingItems(m.id);
  const person = m.personId ? data.persons.find(p => p.id === m.personId) : null;
  const participants = meetingParticipants(m);
  const teamMeeting = isTeamMeeting(m);
  const participantCard = !teamMeeting ? '' : `
    <div class="card">
      <div class="card-header">
        <span class="card-title">Teilnehmer (${participants.length})</span>
      </div>
      <div class="participant-list">
        ${data.persons
          .filter(person => person.type !== 'kontakt')
          .slice()
          .sort(comparePersonsByName)
          .map(member => {
          const active = meetingParticipantIds(m).includes(member.id);
          const locked = m.type === 'oneOnOne' && m.personId === member.id;
          return `
            <button class="participant-pill ${active ? 'active' : ''}" onclick="toggleMeetingParticipant('${m.id}', '${member.id}')" ${locked ? 'disabled' : ''}>
              ${personAvatar(member, 'sm')}
              <span>${esc(member.name)}</span>
            </button>
          `;
        }).join('')}
      </div>
    </div>
  `;
  return `
    ${renderMeetingInsights(m)}

    ${participantCard}

    ${renderMeetingStatusSection(m)}

    ${renderOneOnOneCarryover(m)}

    <div class="meeting-detail-section meeting-detail-section-emphasis">
      <h3>Vorbereitung</h3>
      <div id="prepBullets" class="prep-bullets">${renderPrepBullets(m.id)}</div>
      <button class="btn btn-sm btn-secondary" onclick="addPrepBullet('${m.id}')">+ punkt</button>
    </div>

    <div class="meeting-detail-section meeting-detail-section-emphasis">
      <h3>Mitschrift</h3>
      <textarea class="form-textarea" style="min-height:400px" placeholder="Notizen..."
        onchange="updateMeetingField('${m.id}','notes',this.value)">${esc(m.notes || '')}</textarea>
    </div>

}

function openMeetingFollowUp(meetingId) {

function updateMeetingField(id, field, value) {

}

function openMeetingTitleForm(id) {

function saveMeetingTitle(id) {

function openScheduleMeetingDate(id) {

function saveScheduledMeetingDate(id) {

function toggleMeetingParticipant(meetingId, personId) {
  const meeting = data.meetings.find(entry => entry.id === meetingId);
  if (!meeting) return;
  if (meeting.type === 'oneOnOne' && meeting.personId === personId) return;
  const participants = meetingParticipantIds(meeting).filter(id => id !== meeting.personId);
  const next = participants.includes(personId)
    ? participants.filter(id => id !== personId)
    : [...participants, personId];
  meeting.participants = next;
  saveData(data);
  render();
}

function toggleMeetingTeamFlag(meetingId, checked) {
  const meeting = data.meetings.find(entry => entry.id === meetingId);
  if (!meeting || meeting.type === 'oneOnOne') return;
  meeting.isTeamMeeting = checked;
  if (!checked) meeting.participants = [];

}

// ---- Prep bullet editor ----
function autoResizePrepBullet(el) {
  el.style.height = 'auto';
  el.style.height = (el.scrollHeight + 2) + 'px';
}

function renderPrepBulletList(meetingId, bullets) {
  if (!bullets.length) return `<div class="prep-empty">Noch keine Punkte</div>`;
  return bullets.map((b, idx) => `
    <div class="prep-bullet ${b.done ? 'prep-bullet-done' : ''}">
      <input type="checkbox" ${b.done ? 'checked' : ''} onchange="togglePrepBullet('${meetingId}', ${idx})">
      <textarea class="prep-bullet-input" rows="1"
        placeholder="Gedanke, Frage, Info... (Shift+Enter für Zeilenumbruch)"
        oninput="autoResizePrepBullet(this)"
        onchange="editPrepBullet('${meetingId}', ${idx}, this.value)"
        onkeydown="prepBulletKey(event, '${meetingId}', ${idx})">${esc(b.text)}</textarea>
      <button class="prep-bullet-delete" onclick="deletePrepBullet('${meetingId}', ${idx})" title="Löschen">&#x2715;</button>
    </div>
  `).join('');
}

function renderPrepBullets(meetingId) {
  const m = data.meetings.find(x => x.id === meetingId);
  return renderPrepBulletList(meetingId, m ? parsePrepBullets(m.prep) : []);
}

function readPrepBulletsFromDOM() {
  const section = document.getElementById('prepBullets');
  if (!section) return [];
  const rows = section.querySelectorAll('.prep-bullet');
  return Array.from(rows).map(row => ({
    text: row.querySelector('.prep-bullet-input').value,
    done: row.querySelector('input[type=checkbox]').checked,
  }));
}

function commitPrepBullets(meetingId, bullets) {
  const m = data.meetings.find(x => x.id === meetingId);
  if (!m) return;
  m.prep = serializePrepBullets(bullets);
  saveData(data);
}

function renderPrepBulletsWith(meetingId, bullets, focusIdx) {
  const section = document.getElementById('prepBullets');
  if (!section) return;
  section.innerHTML = renderPrepBulletList(meetingId, bullets);
  section.querySelectorAll('.prep-bullet-input').forEach(autoResizePrepBullet);
  if (focusIdx !== undefined && focusIdx !== null) {
    const inputs = section.querySelectorAll('.prep-bullet-input');
    const target = inputs[focusIdx];
    if (target) {
      target.focus();
      const v = target.value;
      target.setSelectionRange(v.length, v.length);
    }
  }
}

function togglePrepBullet(meetingId, idx) {
  const bullets = readPrepBulletsFromDOM();
  if (!bullets[idx]) return;
  commitPrepBullets(meetingId, bullets);
  renderPrepBulletsWith(meetingId, bullets);
}

function editPrepBullet(meetingId, idx, value) {
  const bullets = readPrepBulletsFromDOM();
  if (!bullets[idx]) return;
  bullets[idx].text = value;
  commitPrepBullets(meetingId, bullets);
}

function deletePrepBullet(meetingId, idx) {
  const bullets = readPrepBulletsFromDOM();
  bullets.splice(idx, 1);
  commitPrepBullets(meetingId, bullets);
  renderPrepBulletsWith(meetingId, bullets, Math.max(0, idx - 1));
}

function addPrepBullet(meetingId) {
  const bullets = readPrepBulletsFromDOM();
  bullets.push({ text: '', done: false });
  commitPrepBullets(meetingId, bullets);
  renderPrepBulletsWith(meetingId, bullets, bullets.length - 1);
}

function prepBulletKey(event, meetingId, idx) {
  if (event.key === 'Enter' && !event.shiftKey) {
    event.preventDefault();
    const bullets = readPrepBulletsFromDOM();
    bullets.splice(idx + 1, 0, { text: '', done: false });
    commitPrepBullets(meetingId, bullets);
    renderPrepBulletsWith(meetingId, bullets, idx + 1);
  } else if (event.key === 'Backspace' && !event.target.value) {
    event.preventDefault();
    const bullets = readPrepBulletsFromDOM();
    if (bullets.length <= 1 && !bullets[0]?.text) return;
    bullets.splice(idx, 1);
    commitPrepBullets(meetingId, bullets);
    renderPrepBulletsWith(meetingId, bullets, Math.max(0, idx - 1));
  }
}

function initPrepBulletsAutoResize() {
  const section = document.getElementById('prepBullets');
  if (!section) return;
  section.querySelectorAll('.prep-bullet-input').forEach(autoResizePrepBullet);
}

// ---- Insights ----
function renderMeetingInsights(m) {
  const today = todayStr();
  const referenceDate = m.date || today;
  const parts = [];

  const items = meetingItems(m.id);
  if (items.length) {
    const done = items.filter(i => i.status === 'done').length;
    const open = items.length - done;
    const pct = Math.round((done / items.length) * 100);
    parts.push(`<div class="insight-row"><span class="insight-label">Follow-ups</span><span class="insight-value">${done}/${items.length} erledigt (${pct}%)${open ? ` · ${open} offen` : ''}</span></div>`);
  }

  if (m.type !== 'oneOnOne' && m.title) {
    const sameTitle = data.meetings
      .filter(x => x.title === m.title && x.id !== m.id);
    if (sameTitle.length) {
      const prior = sameTitle
        .filter(x => x.date && m.date && x.date < m.date)
        .sort((a, b) => b.date.localeCompare(a.date))[0];
      const total = sameTitle.length + 1;
      parts.push(`<div class="insight-row"><span class="insight-label">serie</span><span class="insight-value">${total}× insgesamt${prior ? ` · <a href="#" onclick="event.preventDefault();navigate('meetings:detail', {meetingId:'${prior.id}'})">vorheriges am ${formatDate(prior.date)}</a>` : ''}</span></div>`);
    }
  }

  if (m.type === 'oneOnOne' && m.personId) {
    const person = data.persons.find(p => p.id === m.personId);
    if (person?.pushDirection) {
      parts.push(`<div class="insight-row insight-row-push"><span class="insight-label">Push</span><span class="insight-value">${esc(person.pushDirection)}</span></div>`);
    }

    const prior = data.meetings
      .filter(x => x.type === 'oneOnOne' && x.personId === m.personId && x.id !== m.id && x.date && x.date < referenceDate)
      .sort((a, b) => b.date.localeCompare(a.date))[0];
    if (prior) {
      const gap = Math.round((parseISO(referenceDate) - parseISO(prior.date)) / 86400000);
      parts.push(`<div class="insight-row"><span class="insight-label">seit letztem 1:1</span><span class="insight-value">${gap} Tage · <a href="#" onclick="event.preventDefault();navigate('meetings:detail', {meetingId:'${prior.id}'})">${formatDate(prior.date)}</a></span></div>`);
    }
  }

  if (!parts.length) return '';
  return `
    <div class="meeting-detail-section">
      <h3>Insights</h3>
      <div class="insights-list">${parts.join('')}</div>
    </div>
  `;
}

const personFieldSaveTimers = {};

function updatePersonFieldDebounced(id, field, value) {
  const p = data.persons.find(p => p.id === id);
  if (!p) return;
  p[field] = value;
  const timerKey = `${id}:${field}`;
  clearTimeout(personFieldSaveTimers[timerKey]);
  personFieldSaveTimers[timerKey] = setTimeout(() => {

}

    .sort((a, b) => (b.date || '').localeCompare(a.date || ''));

}

    .filter(meeting => meeting.type === 'oneOnOne' && meeting.personId === personId)

function personAbsenceOnDate(personId, date) {
  return data.blocks.find(block =>
    block.personId === personId &&
    block.typ === 'abwesenheit' &&
    block.start <= date &&
    block.end >= date
  ) || null;
}

function teamFocusStatusReason(entry) {
  if (entry.absenceToday) return entry.absenceToday.label || 'Abwesend';
  if (entry.attentionLevel === 'low') return '';
  if (entry.dueWaiting.length) return 'Urgieren';
  if (entry.overPlanned) return 'Entlasten';
  if (entry.underPlanned) return 'Einplanen';
  if (entry.daysSinceOneOnOne === null || entry.oneOnOneStale) return '1:1 planen';
  if (entry.openItems.length) return 'Unterstützen';
  return '';
}

<script data-source="./js/dashboard.js">
// ============================================================
// DASHBOARD / REVIEWS
// ============================================================
function reviewPeriod() {
  if (viewState.reviewPeriod === 'month' || viewState.reviewPeriod === 'week') {
    return viewState.reviewPeriod;
  }
  try {
    const saved = localStorage.getItem(REVIEW_PERIOD_KEY);
    return saved === 'month' ? 'month' : 'week';
  } catch {
    return 'week';
  }
}

function setReviewPeriod(period) {
  const next = period === 'month' ? 'month' : 'week';
  viewState.reviewPeriod = next;
  try {
    localStorage.setItem(REVIEW_PERIOD_KEY, next);
  } catch {}
  render();
}

function renderReviewItemList(items, emptyText) {
  if (!items.length) return `<div style="color:var(--text-muted);font-size:14px">${emptyText}</div>`;
  return `<ul class="item-list">${items.map(item => renderItem(item)).join('')}</ul>`;
}

function renderReviewMeetingList(meetings, emptyText) {
  if (!meetings.length) return `<div style="color:var(--text-muted);font-size:14px">${emptyText}</div>`;

    const day = date ? String(date.getDate()).padStart(2, '0') : '--';
    const metaDate = meeting.date ? formatDate(meeting.date) : 'ohne Datum';
    return `
      <div class="review-meeting-row" onclick="navigate('meetings:detail', {meetingId:'${meeting.id}'})">

        </div>
        <div class="review-meeting-main">
          <div class="review-row-title">${meetingDisplayTitle(meeting)}</div>
          <div class="review-row-meta">
            ${meeting.personId ? '@' + esc(personName(meeting.personId)) + ' · ' : ''}${metaDate}
          </div>

        <div class="review-row-side">
          ${meeting.date

}

function reviewMarkerRelativeLabel(date) {
  const diff = Math.round((parseISO(date) - parseISO(todayStr())) / 86400000);
  if (diff === 0) return 'heute';
  if (diff === 1) return 'morgen';
  if (diff <= 13) return `in ${diff} Tagen`;
  const weeks = Math.round(diff / 7);
  return `in ${weeks} Wochen`;
}

function renderReviewMarkerList(markers, emptyText) {
  if (!markers.length) return `<div style="color:var(--text-muted);font-size:14px">${emptyText}</div>`;
  return markers.map(marker => {
    const date = marker.date ? new Date(`${marker.date}T12:00:00`) : null;
    const weekday = date ? date.toLocaleDateString('de-AT', { weekday: 'short' }).replace('.', '') : '';
    const day = date ? String(date.getDate()).padStart(2, '0') : '--';
    const color = marker.color || 'var(--accent)';
    return `
      <div class="review-meeting-row review-marker-row" onclick="openMarkerForm('${marker.id}')" style="--marker-color:${esc(color)}">
        <div class="review-meeting-badge review-marker-badge">
          <div class="review-meeting-badge-weekday">${esc(weekday)}</div>
          <div class="review-meeting-badge-day">${day}</div>
        </div>
        <div class="review-meeting-main">
          <div class="review-row-title">${esc(marker.label || 'Marker')}</div>
          <div class="review-row-meta">${marker.date ? formatDate(marker.date) : 'ohne Datum'}</div>
        </div>
        <div class="review-row-side review-marker-side">${marker.date ? reviewMarkerRelativeLabel(marker.date) : ''}</div>
      </div>

  }).join('');
}

function itemStatusLabel(status) {
  return ({
    todo: 'todo',
    backlog: 'backlog',
    waiting: 'wartet',
    done: 'done',
  })[status] || status;
}

function reviewDueRelativeLabel(itemDate, today) {
  if (!itemDate) return '';
  if (itemDate === today) return 'heute';
  const days = Math.round((parseISO(today) - parseISO(itemDate)) / 86400000);
  if (days === 1) return 'seit gestern';
  return `seit ${days} Tagen`;
}

function renderReviewDueItem(item, tone) {
  const today = todayStr();
  const linkedMeeting = item.meetingId ? data.meetings.find(meeting => meeting.id === item.meetingId) : null;
  const notesPreview = previewText(item.notes);

    <li class="review-due-item review-due-item-${tone}">
      <button class="review-due-item-main" onclick="openEditItem('${item.id}')">
        <span class="review-due-item-date">
          <span class="review-due-item-day">${formatDateShort(item.date)}</span>

        </span>
        <span class="review-due-item-body">

          <span class="review-due-item-meta">

function renderReviewDueList(items) {

function dashboardLinkKind(link) {
  const value = `${link.kind || ''} ${link.title || ''} ${link.url || ''}`.toLocaleLowerCase('de-AT');
  if (value.includes('jira') || value.includes('atlassian')) return 'jira';
  if (value.includes('gitlab')) return 'gitlab';
  return 'link';
}

function dashboardLinkHost(url) {
  const href = normalizeExternalUrl(url);
  if (!href) return '';
  try {
    return new URL(href).hostname.replace(/^www\./, '');
  } catch {
    return href.replace(/^https?:\/\//i, '').split('/')[0];
  }
}

function dashboardLinkInitial(link) {
  return (link.title || 'L').trim().slice(0, 1).toUpperCase();
}

function renderDashboardLinkMark(link) {
  const kind = dashboardLinkKind(link);
  if (kind === 'jira' || kind === 'gitlab') return memberLinkIcon(kind);
  return esc(dashboardLinkInitial(link));
}

function renderDashboardLinks() {

    <div class="dashboard-links">

function renderDashboardReviewAction() {
  const count = monthReviewMonths().length;

      <span>monatsrückblicke</span>

function renderReviews() {
  const period = reviewPeriod();
  const currentMonthLabel = currentMonth();
  const dueItems = data.items
    .filter(item => item.status !== 'done' && item.status !== 'backlog' && item.date && item.date <= todayStr())
    .sort(compareByDueDate);
  const upcomingOneOnOnes = data.meetings
    .filter(meeting => meeting.type === 'oneOnOne' && (!meeting.date || meeting.date >= todayStr()))
    .sort(compareUpcomingMeetingDate)
    .slice(0, 6);
  const upcomingMeetings = data.meetings
    .filter(meeting => meeting.type !== 'oneOnOne' && meeting.date && meeting.date >= todayStr())
    .sort((a, b) => a.date.localeCompare(b.date))
    .slice(0, 8);
  const upcomingMarkers = (data.markers || [])
    .filter(marker => marker.date && marker.date >= todayStr())
    .sort((a, b) => a.date.localeCompare(b.date))
    .slice(0, 5);
  const periodDays = period === 'month' ? 30 : 7;
  const planStart = todayStr();
  const planEnd = dateShift(planStart, periodDays - 1);
  const today = todayStr();
  const todoMonth = currentMonth();
  const peopleAttention = data.persons
    .filter(person => person.type !== 'kontakt')
    .map(person => {
      const openItems = data.items.filter(item => item.personId === person.id && item.month === todoMonth && item.status !== 'done');
      const waitingItems = openItems.filter(item => item.status === 'waiting');
      const dueWaiting = waitingItems.filter(item => item.date && item.date <= today);
      const dueTodos = openItems.filter(item => item.status === 'todo' && item.date && item.date <= today);
      const lastOneOnOne = personLastOneOnOneDate(person.id);
      const absenceToday = personAbsenceOnDate(person.id, today);
      const cap = personCapacity(person.id, planStart, planEnd);
      const daysSinceOneOnOne = lastOneOnOne ? Math.round((parseISO(today) - parseISO(lastOneOnOne)) / 86400000) : null;
      const utilization = cap.werktage > 0 ? Math.round((cap.allokiert / cap.werktage) * 100) : 0;
      const overPlanned = cap.frei < 0;
      const underPlanned = !overPlanned && cap.werktage > 0 && utilization < 60;
      const oneOnOneStale = daysSinceOneOnOne !== null && daysSinceOneOnOne > 7;
      const oneOnOneVeryStale = daysSinceOneOnOne !== null && daysSinceOneOnOne > 21;
      const attentionScore =
        (dueWaiting.length * 20) +
        (dueTodos.length * 12) +
        (waitingItems.length * 10) +
        (openItems.length * 4) +
        (overPlanned ? 45 + Math.abs(cap.frei) * 3 : 0) +
        (underPlanned ? 34 : 0) +
        (oneOnOneVeryStale ? 20 : oneOnOneStale ? 12 : 0) +
        (!lastOneOnOne ? 18 : 0);
      const attentionLevel = attentionScore >= 50 ? 'high' : attentionScore >= 20 ? 'medium' : 'low';
      const workloadHint = cap.werktage > 0
        ? `${cap.allokiert}/${cap.werktage} WT belegt · ${utilization}%`
        : '0/0 WT belegt · 0%';
      let planningState;
      let planningHint;
      if (cap.werktage === 0) {
        planningState = 'kein Plan';
        planningHint = 'kein Planfenster';
      } else if (overPlanned) {
        planningState = 'entlasten';
        planningHint = `${Math.abs(cap.frei)} WT überplant`;
      } else if (underPlanned) {
        planningState = 'unterplant';
        planningHint = `${cap.frei} WT frei`;
      } else {
        planningState = 'ausgeglichen';
        planningHint = cap.frei === 0 ? 'voll belegt' : `${cap.frei} WT frei`;
      }
      return {
        person, openItems, waitingItems, dueWaiting, dueTodos,
        absenceToday,
        lastOneOnOne, daysSinceOneOnOne, oneOnOneStale, oneOnOneVeryStale,
        attentionScore, attentionLevel, cap, utilization, workloadHint, planningState, planningHint,
        overPlanned, underPlanned,
      };
    })
    .sort((a, b) => {
      if (!!a.absenceToday !== !!b.absenceToday) return a.absenceToday ? 1 : -1;
      if (b.attentionScore !== a.attentionScore) return b.attentionScore - a.attentionScore;
      return a.person.name.localeCompare(b.person.name, 'de-AT');
    });

  return `
    <div class="section-header">
      ${renderDashboardLinks()}
      ${renderDashboardReviewAction()}
    </div>

    <div class="review-grid">
      <div class="card review-team-focus-card">
        <div class="card-header">
          <span class="card-title">Teamfokus <span class="tf-period-hint">&middot; nächste ${periodDays} Tage</span></span>
          <div class="team-focus-tools">
            <div class="filters">
              <button class="filter-btn ${period === 'week' ? 'active' : ''}" onclick="setReviewPeriod('week')">7 Tage</button>
              <button class="filter-btn ${period === 'month' ? 'active' : ''}" onclick="setReviewPeriod('month')">30 Tage</button>
            </div>
            <span
              class="info-chip"
              title="Ranking nach Aufmerksamkeitsbedarf. Signale: offene Items im aktuellen Todo-Monat, Planungsauslastung (nächste ${periodDays} Tage), 1:1-Abstand (>7d markiert, >21d stark). Abwesenheit heute wird grau markiert."
              aria-label="Erklärung zum Teamfokus-Ranking"
            >?</span>
          </div>
        </div>
        <div class="review-team-focus-list">
        ${peopleAttention.length ? peopleAttention.map(entry => {
          const oneOnOneLabel = entry.daysSinceOneOnOne === null
            ? 'nie'
            : entry.daysSinceOneOnOne < -1 ? `in ${Math.abs(entry.daysSinceOneOnOne)} Tagen`
            : entry.daysSinceOneOnOne === -1 ? 'morgen'
            : entry.daysSinceOneOnOne === 0 ? 'heute'
            : entry.daysSinceOneOnOne === 1 ? 'gestern'
            : `vor ${entry.daysSinceOneOnOne} Tagen`;
          const attentionLabel = teamFocusStatusReason(entry);
          const rowStateClass = entry.absenceToday ? 'absent' : entry.attentionLevel;
          const absenceLabel = entry.absenceToday ? (entry.absenceToday.label || 'Abwesenheit') : '';
          const lastOneOnOneMeeting = personLastOneOnOneMeeting(entry.person.id);
          const itemLabel = entry.dueWaiting.length
            ? `${entry.openItems.length} offen · ${entry.dueWaiting.length} fällig wartet`
            : entry.waitingItems.length
              ? `${entry.openItems.length} offen · ${entry.waitingItems.length} wartet`
            : entry.openItems.length
              ? `${entry.openItems.length} offen`
              : 'keine offenen Items';
          const supportItems = entry.openItems.filter(item => item.status !== 'waiting');
          const supportLabel = supportItems.length
            ? `${supportItems.length} offen`
            : 'nichts offen';
          const supportNote = supportItems.length
            ? 'unterstützen'
            : 'alles erledigt';
          const waitingLabel = entry.dueWaiting.length
            ? `${entry.waitingItems.length} wartet · ${entry.dueWaiting.length} fällig`
            : entry.waitingItems.length
              ? `${entry.waitingItems.length} wartet`
              : 'nichts wartet';
          const waitingNote = entry.dueWaiting.length
            ? 'nachfassen'
            : entry.waitingItems.length ? 'warten auf' : 'alles erledigt';
          const supportThisMonth = personSupportInMonth(entry.person, currentMonthLabel);
          const detailTitle = `${attentionLabel} | ${itemLabel} | ${entry.workloadHint} | 1:1 ${oneOnOneLabel}${supportThisMonth ? ` | Support ${formatMonth(currentMonthLabel)}` : ''}${absenceLabel ? ' | heute: ' + absenceLabel : ''}`;
          return `
          <details class="review-row review-row-${rowStateClass}" title="${esc(detailTitle)}">
            <summary>
              <button class="tf-person-link" type="button" onclick="event.preventDefault(); event.stopPropagation(); openPersonById('${entry.person.id}')" title="Teammitglied öffnen">
                ${personAvatar(entry.person, 'md', { absent: !!entry.absenceToday })}
              </button>
              <div class="tf-main">
                <div class="tf-name-line">
                  <button class="review-row-title tf-name-link" type="button" onclick="event.preventDefault(); event.stopPropagation(); openPersonById('${entry.person.id}')" title="Teammitglied öffnen">${esc(entry.person.name)}</button>
                  ${supportThisMonth ? `<span class="tl-sup-badge" title="Support ${esc(formatMonth(currentMonthLabel))}">sup</span>` : ''}
                </div>
                <div class="tf-expanded-subline">
                  <span class="tf-subline-label">Planung</span>
                  <span class="tf-subline-value">${entry.planningState}</span>
                  <span class="tf-subline-sep">·</span>
                  <span>${entry.planningHint}</span>
                </div>
              </div>
              <div class="review-row-side">
                ${attentionLabel ? `<div class="tf-state tf-state-${rowStateClass}">${esc(attentionLabel)}</div>` : ''}
                <div class="tf-util">${entry.openItems.length} offen</div>
              </div>
              <span class="tf-expand" aria-hidden="true"></span>
            </summary>
            <div class="tf-mini-dashboard">
              <button class="tf-metric tf-metric-action ${entry.overPlanned ? 'tf-sig-bad' : entry.underPlanned ? 'tf-sig-warn' : 'tf-sig-ok'}" type="button" onclick="event.preventDefault(); event.stopPropagation(); openPersonById('${entry.person.id}')" title="Teammitglied öffnen">
                <span class="tf-metric-label">Workload</span>
                <span class="tf-metric-value">${entry.workloadHint}</span>
                <span class="tf-metric-note">${entry.planningState}</span>
              </button>
              <button class="tf-metric tf-metric-action ${entry.daysSinceOneOnOne === null || entry.oneOnOneVeryStale ? 'tf-sig-bad' : entry.oneOnOneStale ? 'tf-sig-warn' : 'tf-sig-ok'}" type="button" onclick="event.preventDefault(); event.stopPropagation(); ${lastOneOnOneMeeting ? `openMeetingDetail('${lastOneOnOneMeeting.id}')` : `openPersonById('${entry.person.id}')`}" title="${lastOneOnOneMeeting ? 'Letztes 1:1 öffnen' : 'Kein 1:1 vorhanden'}">
                <span class="tf-metric-label">Letztes 1:1</span>
                <span class="tf-metric-value">${entry.lastOneOnOne ? oneOnOneLabel : 'noch keines'}</span>
              </button>
              <button class="tf-metric tf-metric-action ${supportItems.length ? 'tf-sig-warn' : 'tf-sig-ok'}" type="button" onclick="event.preventDefault(); event.stopPropagation(); openPersonTodos('${entry.person.id}')" title="Todo-Liste nach ${esc(entry.person.name)} filtern">
                <span class="tf-metric-label">Unterstützen</span>
                <span class="tf-metric-value">${supportLabel}</span>
              </button>
              <button class="tf-metric tf-metric-action ${entry.dueWaiting.length ? 'tf-sig-bad' : entry.waitingItems.length ? 'tf-sig-warn' : 'tf-sig-ok'}" type="button" onclick="event.preventDefault(); event.stopPropagation(); openPersonTodos('${entry.person.id}')" title="Todo-Liste nach ${esc(entry.person.name)} filtern">
                <span class="tf-metric-label">Warten auf</span>
                <span class="tf-metric-value">${waitingLabel}</span>
              </button>
            </div>
          </details>`;
        }).join('') : '<div style="color:var(--text-muted);font-size:14px">Keine Teammitglieder vorhanden</div>'}
              </div>
            </div>

      <div class="review-meeting-stack">
        <div class="card">
          <div class="card-header"><span class="card-title">Nächste Meetings</span></div>
          ${renderReviewMeetingList(upcomingMeetings, 'Keine kommenden Meetings')}
        </div>

        <div class="card">
          <div class="card-header"><span class="card-title">Nächste 1:1</span></div>
          ${renderReviewMeetingList(upcomingOneOnOnes, 'Keine kommenden 1:1s')}
        </div>
      </div>

      <div class="card review-events-card">
        <div class="card-header"><span class="card-title">Events</span></div>
        ${renderReviewMarkerList(upcomingMarkers, 'Keine kommenden Events')}
      </div>

      <div class="card review-due-card">
        <div class="card-header">
          <span class="card-title">Fällig</span>
          <span class="search-summary">${dueItems.length} Items</span>
        </div>
        ${renderReviewDueList(dueItems)}
      </div>
    </div>

    ${renderMonthlyFocusPanel(currentMonthLabel)}
    ${renderMonthImpactPanel(currentMonthLabel)}
  `;
}

</script>
<script data-source="./js/search.js">
// ============================================================
// GLOBAL SEARCH
// ============================================================
function syncGlobalSearchInput() {
  const input = document.getElementById('globalSearchInput');
  if (!input) return;
  const nextValue = currentView === 'search' ? (viewState.query || '') : '';
  if (input.value !== nextValue) input.value = nextValue;
}

function handleGlobalSearchInput(value) {
  const query = value.trim();
  if (!query) {
    if (currentView === 'search') navigate('overview');
    return;
  }
  navigate('search', { query: value });
}

function handleGlobalSearchKeydown(event) {
  if (event.key === 'Escape') {
    event.preventDefault();
    event.currentTarget.value = '';
    if (currentView === 'search') navigate('overview');
    return;
  }
  if (event.key === 'Enter') {
    event.preventDefault();
    submitGlobalSearch();
  }
}

function submitGlobalSearch() {
  const input = document.getElementById('globalSearchInput');
  if (!input) return;
  const query = input.value.trim();
  if (!query) {
    if (currentView === 'search') navigate('overview');
    return;
  }
  navigate('search', { query });
}

function restoreOverviewSearchFocus() {
  if (currentView !== 'overview' || !pendingOverviewSearchSelection) return;
  const input = document.getElementById('overviewSearchInput');
  if (!input) return;
  const { start, end } = pendingOverviewSearchSelection;
  input.focus();
  input.setSelectionRange(start ?? input.value.length, end ?? input.value.length);
  pendingOverviewSearchSelection = null;
}

function restoreMeetingSearchFocus() {
  if (!currentView.startsWith('meetings') || !pendingMeetingSearchSelection) return;
  const input = document.getElementById('meetingSearchInput');
  if (!input) return;
  const { start, end } = pendingMeetingSearchSelection;
  pendingMeetingSearchSelection = null;
  requestAnimationFrame(() => {
    const nextInput = document.getElementById('meetingSearchInput');
    if (!nextInput) return;
    nextInput.focus({ preventScroll: true });
    nextInput.setSelectionRange(start ?? nextInput.value.length, end ?? nextInput.value.length);
  });
}


</script>
<script data-source="./js/capture.js">
// ============================================================
// QUICK CAPTURE
// ============================================================
function personOptions(selectedId) {
  const team = data.persons
    .filter(p => p.type !== 'kontakt')
    .slice()
    .sort(comparePersonsByName);
  const kontakte = data.persons
    .filter(p => p.type === 'kontakt')
    .slice()
    .sort(comparePersonsByName);
  let html = '';
  if (team.length) {
    html += `<optgroup label="Team">`;
    html += team.map(p => `<option value="${p.id}" ${selectedId === p.id ? 'selected' : ''}>${esc(p.name)}</option>`).join('');
    html += `</optgroup>`;
  }
  if (kontakte.length) {
    html += `<optgroup label="Kontakte">`;
    html += kontakte.map(p => `<option value="${p.id}" ${selectedId === p.id ? 'selected' : ''}>${esc(p.name)}</option>`).join('');
    html += `</optgroup>`;
  }
  return html;
}

function captureModeForType(type) {
  if (type === 'meeting' || type === 'oneOnOne') return 'meeting';
  return isGrowthType(type) ? 'teammate' : 'personal';
}

function currentCaptureMode() {
  return document.getElementById('captureMode')?.value || 'personal';
}

function setCaptureMode(mode) {
  const input = document.getElementById('captureMode');
  if (!input) return;
  input.value = ['personal', 'teammate', 'meeting'].includes(mode) ? mode : 'personal';
  updateCaptureModeUI();
  updateCaptureDateUI();
}

function updateCaptureModeUI() {
  const mode = currentCaptureMode();
  const personalActive = mode === 'personal';
  const teammateActive = mode === 'teammate';
  const meetingActive = mode === 'meeting';
  const personalBtn = document.getElementById('captureModePersonal');
  const teammateBtn = document.getElementById('captureModeTeammate');
  const meetingBtn = document.getElementById('captureModeMeeting');
  const textGroup = document.getElementById('captureTextGroup');
  const personalFields = document.getElementById('capturePersonalFields');
  const teammateFields = document.getElementById('captureTeammateFields');
  const meetingFields = document.getElementById('captureMeetingFields');
  const personalPersonGroup = document.getElementById('capturePersonalPersonGroup');
  const dateGroup = document.getElementById('captureDateGroup');
  const meetingGroup = document.getElementById('captureMeetingGroup');
  const notesGroup = document.getElementById('captureNotesGroup');
  const monthGroup = document.getElementById('captureMonthGroup');
  const showMonthGroup = personalActive;
  if (personalBtn) personalBtn.classList.toggle('active', personalActive);
  if (teammateBtn) teammateBtn.classList.toggle('active', teammateActive);
  if (meetingBtn) meetingBtn.classList.toggle('active', meetingActive);
  if (textGroup) textGroup.style.display = meetingActive ? 'none' : '';
  if (personalFields) personalFields.style.display = personalActive ? '' : 'none';
  if (teammateFields) teammateFields.style.display = teammateActive ? '' : 'none';
  if (meetingFields) meetingFields.style.display = meetingActive ? '' : 'none';
  if (personalPersonGroup) personalPersonGroup.style.display = personalActive ? '' : 'none';
  if (dateGroup) dateGroup.style.display = meetingActive ? 'none' : '';
  if (meetingGroup) meetingGroup.style.display = personalActive ? '' : 'none';
  if (notesGroup) notesGroup.style.display = personalActive ? '' : 'none';
  if (monthGroup) monthGroup.style.display = showMonthGroup ? '' : 'none';
  if (meetingActive) updateCaptureMeetingTypeUI();
}

function updateCaptureTypeUI() {
  const type = document.getElementById('captureType')?.value || 'todo';
  const statusSelect = document.getElementById('captureStatus');
  if (statusSelect && type === 'win') statusSelect.value = 'done';
  updateCaptureModeUI();
  updateCaptureDateUI();
}

function updateCaptureDateUI() {
  const mode = currentCaptureMode();
  const type = document.getElementById('captureType')?.value || 'todo';
  const status = document.getElementById('captureStatus')?.value || 'todo';
  const dateInput = document.getElementById('captureDate');
  if (!dateInput) return;
  const dateDisabled = mode === 'personal' && type !== 'win' && status === 'backlog';
  dateInput.disabled = dateDisabled;
  if (dateDisabled) dateInput.value = '';
}

function currentCaptureMeetingType() {
  return document.getElementById('captureMeetingType')?.value || 'meeting';
}

function setCaptureMeetingType(type) {
  const input = document.getElementById('captureMeetingType');
  if (!input) return;
  input.value = type === 'oneOnOne' ? 'oneOnOne' : 'meeting';
  updateCaptureMeetingTypeUI();
}

function updateCaptureMeetingTypeUI() {
  const type = currentCaptureMeetingType();
  const isOneOnOne = type === 'oneOnOne';
  const meetingBtn = document.getElementById('captureMeetingTypeMeeting');
  const oneOnOneBtn = document.getElementById('captureMeetingTypeOneOnOne');
  const titleGroup = document.getElementById('captureMeetingTitleGroup');
  const teamGroup = document.getElementById('captureMeetingTeamGroup');
  const personGroup = document.getElementById('captureMeetingPersonGroup');
  const oneOnOneDateHint = document.getElementById('captureOneOnOneDateHint');
  const dateInput = document.getElementById('meetingDate');
  if (meetingBtn) meetingBtn.classList.toggle('active', !isOneOnOne);
  if (oneOnOneBtn) oneOnOneBtn.classList.toggle('active', isOneOnOne);
  if (titleGroup) titleGroup.style.display = isOneOnOne ? 'none' : '';
  if (teamGroup) teamGroup.style.display = isOneOnOne ? 'none' : '';
  if (personGroup) personGroup.style.display = isOneOnOne ? '' : 'none';
  if (oneOnOneDateHint) oneOnOneDateHint.style.display = isOneOnOne ? '' : 'none';
  if (dateInput && !isOneOnOne && !dateInput.value) dateInput.value = todayStr();
  updateMeetingStatusPreview();
}

function currentEditType() {
  return document.getElementById('editType')?.value || 'todo';
}

function updateEditItemTypeUI() {
  const type = currentEditType();
  const isGrowth = isGrowthType(type);
  const statusSelect = document.getElementById('editStatus');
  const meetingGroup = document.getElementById('editMeetingGroup');
  const monthInput = document.getElementById('editMonth');
  const personLabel = document.getElementById('editPersonLabel');
  if (statusSelect) {
    statusSelect.disabled = isGrowth;
    if (isGrowth) statusSelect.value = 'done';
  }
  if (meetingGroup) meetingGroup.style.display = isGrowth ? 'none' : '';
  if (personLabel) personLabel.textContent = isGrowth ? 'Teammitglied' : 'Person';
  if (monthInput && document.getElementById('editDate')?.value) monthInput.value = document.getElementById('editDate').value.slice(0, 7);
  updateEditItemDateUI();
}

function updateEditItemDateUI() {
  const type = currentEditType();
  const status = document.getElementById('editStatus')?.value || 'todo';
  const dateInput = document.getElementById('editDate');
  if (!dateInput) return;
  const dateDisabled = !isGrowthType(type) && status === 'backlog';
  dateInput.disabled = dateDisabled;
  if (dateDisabled) dateInput.value = '';
}

  const teamPersons = data.persons

  const existingMeetingTitles = [...new Set(data.meetings
    .filter(m => m.type === 'meeting' && m.title)
    .map(m => m.title))];
  const meetingDate = prefill.date || (captureMeetingType === 'oneOnOne' ? '' : todayStr());

  document.getElementById('modal').innerHTML = `
    <div class="modal-header">
      <span class="modal-title">Quick Capture</span>
      <div><span class="kbd">Ctrl+K</span> <button class="modal-close" onclick="closeOverlay()">&#x2715;</button></div>
    </div>
    <div class="modal-body">
      <input type="hidden" id="captureMode" value="${captureMode}">
      <div class="segmented-toggle capture-mode-toggle">
        <button type="button" class="segmented-toggle-btn" id="captureModePersonal" onclick="setCaptureMode('personal')">mein impact</button>
        <button type="button" class="segmented-toggle-btn" id="captureModeTeammate" onclick="setCaptureMode('teammate')">teamentwicklung</button>
        <button type="button" class="segmented-toggle-btn" id="captureModeMeeting" onclick="setCaptureMode('meeting')">meeting</button>
      </div>
      <div class="form-group" id="captureTextGroup">
        <textarea class="form-textarea" id="captureText" placeholder="Was ist passiert / was muss getan werden?" rows="3" autofocus>${esc(prefill.text || '')}</textarea>
      </div>
      <div id="capturePersonalFields">
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Typ</label>
            <select class="form-select" id="captureType" onchange="updateCaptureTypeUI()">
              <option value="todo" ${(!prefill.type || prefill.type === 'todo') ? 'selected' : ''}>Todo</option>
              <option value="win" ${prefill.type === 'win' ? 'selected' : ''}>Win</option>
            </select>
          </div>
          <div class="form-group">

              <option value="todo" ${captureStatus === 'todo' ? 'selected' : ''}>Todo</option>
              <option value="backlog" ${captureStatus === 'backlog' ? 'selected' : ''}>Backlog</option>

              <option value="done" ${captureStatus === 'done' ? 'selected' : ''}>Done</option>
            </select>

      </div>
      <div id="captureTeammateFields">
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Teammitglied</label>

                .map(person => `<option value="${person.id}" ${selectedPersonId === person.id ? 'selected' : ''}>${esc(person.name)}</option>`)

            <label class="form-label">Eintrag</label>

      <div id="captureMeetingFields">

        <div class="segmented-toggle">
          <button type="button" class="segmented-toggle-btn" id="captureMeetingTypeMeeting" onclick="setCaptureMeetingType('meeting')">meeting</button>

function saveCapture() {
  const mode = currentCaptureMode();
  if (mode === 'meeting') {
    saveCaptureMeeting();
    return;
  }

  const text = document.getElementById('captureText').value.trim();
  if (!text) return;
  let item;
  if (mode === 'teammate') {
    const personId = document.getElementById('captureGrowthPerson').value || null;
    if (!personId) {
      toast('Teammitglied wählen');
      return;
    }
    const date = document.getElementById('captureDate').value;
    item = {
      id: uid(),
      type: document.getElementById('captureGrowthType').value,
      status: 'done',
      text,
      personId,
      meetingId: null,
      date,
      month: date ? date.slice(0, 7) : document.getElementById('captureMonth').value,
      notes: null,
    };
  } else {
    const type = document.getElementById('captureType').value;
    const status = document.getElementById('captureStatus').value;
    const personId = type === 'win' ? null : (document.getElementById('capturePerson').value || null);
    const date = status === 'backlog' ? '' : document.getElementById('captureDate').value;
    item = {
      id: uid(),
      type,
      status,
      text,
      personId,
      meetingId: document.getElementById('captureMeeting').value || null,
      date,
      month: type === 'win'
        ? (date ? date.slice(0, 7) : document.getElementById('captureMonth').value)
        : document.getElementById('captureMonth').value,
      notes: document.getElementById('captureNotes').value.trim() || null,
    };
  }

  data.items.push(item);
  saveData(data);
  closeOverlay();
  toast('Item gespeichert');
  render();
}

function saveCaptureMeeting() {
  const type = currentCaptureMeetingType();
  const isOneOnOne = type === 'oneOnOne';
  const personId = isOneOnOne ? (document.getElementById('meetingPerson')?.value || '') : '';
  if (isOneOnOne && !personId) {
    toast('Person wählen');
    document.getElementById('meetingPerson')?.focus();
    return;
  }

  const title = isOneOnOne
    ? ''
    : (document.getElementById('meetingTitle')?.value.trim() || 'Meeting');
  const meeting = {
    id: uid(),
    type,
    isTeamMeeting: isOneOnOne ? false : !!document.getElementById('meetingIsTeam')?.checked,
    title,
    date: document.getElementById('meetingDate')?.value || '',
    personId: isOneOnOne ? personId : null,
    participants: [],
    prep: document.getElementById('meetingPrep')?.value.trim() || '',
    notes: '',
  };

  data.meetings.push(meeting);
  saveData(data);
  closeOverlay();
  toast('Meeting erstellt');
  navigate('meetings:detail', { meetingId: meeting.id });
}

function updateCaptureMeetingOptions() {

  const meetingSelect = document.getElementById('captureMeeting');

  const currentValue = meetingSelect.value || null;

let draggedItemId = null;

function onItemDragStart(event, id) {
  draggedItemId = id;
  event.dataTransfer.effectAllowed = 'move';
  event.dataTransfer.setData('text/plain', id);
  event.currentTarget.classList.add('dragging');
}

function onItemDragEnd(event) {
  draggedItemId = null;
  event.currentTarget.classList.remove('dragging');
  document.querySelectorAll('.drop-target.drop-over').forEach(el => el.classList.remove('drop-over'));
}

function onItemDragOver(event) {
  event.preventDefault();
  event.dataTransfer.dropEffect = 'move';
  event.currentTarget.classList.add('drop-over');
}

function onItemDragLeave(event) {
  if (event.currentTarget.contains(event.relatedTarget)) return;
  event.currentTarget.classList.remove('drop-over');
}

function onItemDrop(event, status) {
  event.preventDefault();
  event.currentTarget.classList.remove('drop-over');

  const id = event.dataTransfer.getData('text/plain') || draggedItemId;
  if (!id) return;

  const item = data.items.find(i => i.id === id);
  if (!item || item.status === status) return;

  item.status = status;
  if (status === 'backlog') item.date = '';
  saveData(data);
  toast('Status aktualisiert');
  render();
}

function deleteItem(id) {
  if (!confirm('Item löschen?')) return;
  data.items = data.items.filter(i => i.id !== id);
  saveData(data);
  render();
}

function savePerson(id) {
  const name = document.getElementById('personName').value.trim();
  if (!name) return;
  const type = document.getElementById('personType').value;
  const isKontakt = type === 'kontakt';

  if (id) {
    const p = data.persons.find(p => p.id === id);
    if (p) {
      p.name = name;
      if (!isKontakt) {
        p.pushDirection = document.getElementById('personPush').value.trim();
        p.jiraUrl = normalizeExternalUrl(document.getElementById('personJiraUrl').value);
        p.gitlabMrUrl = normalizeExternalUrl(document.getElementById('personGitlabUrl').value);
      }
    }
  } else {
    const person = { id: uid(), name, type };
    if (isKontakt) {
      person.pushDirection = '';
    } else {
      person.pushDirection = document.getElementById('personPush').value.trim();
      person.jiraUrl = normalizeExternalUrl(document.getElementById('personJiraUrl').value);
      person.gitlabMrUrl = normalizeExternalUrl(document.getElementById('personGitlabUrl').value);
    }
    data.persons.push(person);
  }

  saveData(data);
  closeOverlay();
  toast(id ? 'Person aktualisiert' : 'Person angelegt');
  render();
}

function deletePerson(id) {
  if (!confirm('Person und alle zugehörigen Daten löschen?')) return;
  const p = data.persons.find(p => p.id === id);
  const wasKontakt = p && p.type === 'kontakt';
  data.persons = data.persons.filter(p => p.id !== id);
  data.items = data.items.filter(i => i.personId !== id);
  data.meetings = data.meetings
    .filter(m => m.personId !== id)
    .map(m => ({
      ...m,
      participants: meetingParticipantIds(m).filter(participantId => participantId !== id && participantId !== m.personId),
    }));
  saveData(data);
  closeOverlay();
  navigate(wasKontakt ? 'kontakte' : 'team');
}

function updateMeetingStatusPreview() {
  const preview = document.getElementById('meetingStatusPreview');
  const carryoverPreview = document.getElementById('meetingCarryoverPreview');
  const date = document.getElementById('meetingDate')?.value;
  const captureMeetingType = document.getElementById('captureMeetingType')?.value;
  const isOneOnOne = captureMeetingType ? captureMeetingType === 'oneOnOne' : !!document.getElementById('meetingPerson');
  const personId = isOneOnOne ? (document.getElementById('meetingPerson')?.value || '') : '';
  const isTeam = document.getElementById('meetingIsTeam')?.checked ?? true;
  if (preview) preview.innerHTML = renderMeetingFormStatusPreview(date, isOneOnOne, personId, isTeam);
  if (carryoverPreview) carryoverPreview.innerHTML = renderMeetingFormCarryoverPreview(isOneOnOne, personId, date);
}

function renderMeetingFormStatusPreview(dateISO, isOneOnOne, personId, teamMeeting = true) {
  if (!dateISO) return '';
  if (isOneOnOne) {
    if (!personId) return '';
    const person = data.persons.find(p => p.id === personId);
    return renderMeetingTeamStatusForDate(dateISO, {
      inForm: true,
      personIds: [personId],
      heading: person ? person.name : '1:1-Status',
      idPrefix: 'meeting-preview-oneonone',
    });
  }
  if (!teamMeeting) return '';
  return renderMeetingTeamStatusForDate(dateISO, { inForm: true });
}

function renderMeetingFormCarryoverPreview(isOneOnOne, personId, dateISO) {
  if (!isOneOnOne || !personId) return '';
  const carryover = oneOnOneCarryover({
    id: '',
    type: 'oneOnOne',
    personId,
    date: dateISO || todayStr(),
  });
  const total = carryoverCount(carryover);
  if (!total) return '';
  return `
    <div class="meeting-carryover-preview">
      <span>Übernahme</span>
      <strong>${carryover.openFollowUps.length}</strong> Follow-ups
      <strong>${carryover.openTodos.length}</strong> Todos
      <strong>${carryover.recentSignals.length}</strong> Signale
    </div>
  `;
}

function saveMeeting(type) {

      </div>
      <div class="form-group">
        <label class="form-label">URL</label>
        <input class="form-input" id="dashboardLinkUrl" value="${link ? esc(link.url || '') : ''}" placeholder="https://...">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Typ</label>
          <select class="form-select" id="dashboardLinkKind">
            ${['jira', 'gitlab', 'link'].map(kind => `<option value="${kind}" ${dashboardLinkKind(link || {}) === kind ? 'selected' : ''}>${kind}</option>`).join('')}
          </select>
        </div>

          <label class="form-label">Kurzinfo</label>

      </div>
    </div>
  `;
  openOverlay();
}

function saveDashboardLink(id) {
  const title = document.getElementById('dashboardLinkTitle').value.trim();
  const url = normalizeExternalUrl(document.getElementById('dashboardLinkUrl').value);
  if (!title || !url) return;
  if (!data.dashboardLinks) data.dashboardLinks = [];

  const payload = {
    title,
    url,
    kind: document.getElementById('dashboardLinkKind').value,
    label: document.getElementById('dashboardLinkLabel').value.trim(),
  };

  if (id) {
    const link = data.dashboardLinks.find(entry => entry.id === id);
    if (link) Object.assign(link, payload);
  } else {
    data.dashboardLinks.push({ id: uid(), ...payload });
  }

  saveData(data);
  closeOverlay();
  toast('Link gespeichert');
  render();
}

function deleteDashboardLink(id) {
  if (!confirm('Quick Link löschen?')) return;
  data.dashboardLinks = (data.dashboardLinks || []).filter(link => link.id !== id);
  saveData(data);
  closeOverlay();
  render();
}

function monthReviewMonths() {
  return (data.monthReviews || [])
    .filter(review => review.month && review.summary)
    .map(review => review.month)
    .sort((a, b) => b.localeCompare(a));
}

function openMonthReviewsArchive(month) {
  const months = monthReviewMonths();
  const activeMonth = months.includes(month) ? month : months[0];
  const reviews = (data.monthReviews || [])
    .filter(review => review.month && review.summary)
    .reduce((map, review) => ({ ...map, [review.month]: review }), {});
  const activeIndex = activeMonth ? months.indexOf(activeMonth) : -1;
  const prevMonthReview = activeIndex >= 0 ? months[activeIndex + 1] : '';
  const nextMonthReview = activeIndex > 0 ? months[activeIndex - 1] : '';
  const activeReview = activeMonth ? reviews[activeMonth] : null;
  const wins = activeMonth ? monthItems(data.items.filter(isPersonalWin), activeMonth).sort(compareItemsByDateDesc) : [];
  const growth = activeMonth ? monthItems(data.items.filter(isGrowthEntry), activeMonth).sort(compareItemsByDateDesc) : [];

  document.getElementById('modal').className = 'modal modal-month-reviews';
  document.getElementById('modal').innerHTML = `
    <div class="modal-header">

    <div class="modal-body month-reviews-modal-body">

          <div class="month-review-archive-current">

              <div class="month-review-archive-title">Wie der Monat war</div>

function saveMonthClosure(month) {
  const openItems = data.items.filter(i => i.month === month && i.status !== 'done');
  const next = nextMonth(month);
  const shouldCarry = !!document.getElementById('monthCarryoverCheckbox')?.checked && openItems.length > 0;
  const summary = document.getElementById('monthReviewSummary')?.value || '';

  upsertMonthReview(month, summary);

  if (shouldCarry) {
    openItems.forEach(item => {
      item.month = next;
    });
  }

  saveData(data);
  closeOverlay();
  if (shouldCarry) viewState.month = next;
  toast(shouldCarry ? `${openItems.length} Items übernommen` : 'Monatsrückblick gespeichert');
  render();
}

function exportMonth(month) {
  const items = data.items.filter(i => i.month === month);
  const focuses = data.focuses.filter(f => f.month === month);
  const taskItems = items.filter(i => !isGrowthEntry(i));

  let md = `# ${formatMonth(month)}\n\n`;

  if (focuses.length) {
    md += `## Focus\n`;
    focuses.forEach(f => {
      md += `- **${f.title}**${f.description ? ': ' + f.description : ''}\n`;
    });
    md += '\n';
  }

  const review = monthReview(month);
  if (review) {
    md += `## Monatsrückblick\n`;
    md += `${review.summary}\n\n`;
  }

  const groups = [
    ['Todo', taskItems.filter(i => i.status === 'todo')],
    ['Backlog', taskItems.filter(i => i.status === 'backlog')],
    ['Warte auf', taskItems.filter(i => i.status === 'waiting')],
    ['Done', taskItems.filter(i => i.status === 'done')],
  ];

  groups.forEach(([title, list]) => {
    if (list.length) {
      md += `## ${title}\n`;
      list.forEach(i => {
        const check = i.status === 'done' ? 'x' : ' ';
        const person = i.personId ? ` (@${personName(i.personId)})` : '';
        const badge = i.type !== 'todo' ? ` [${itemTypeLabel(i.type)}]` : '';
        md += `- [${check}] ${i.text}${person}${badge}\n`;
        if (i.notes) md += `  > ${i.notes.replace(/\n/g, '\n  > ')}\n`;
      });
      md += '\n';
    }
  });

  const wins = items.filter(isPersonalWin);
  if (wins.length) {
    md += `## My Wins\n`;
    wins.forEach(i => { md += `- ${formatDate(i.date)}: ${i.text}\n`; });
    md += '\n';
  }

  const growth = items.filter(isGrowthEntry).sort(compareItemsByDateDesc);
  if (growth.length) {
    md += `## Team Growth\n`;
    growth.forEach(i => { md += `- ${formatDate(i.date)}: ${personName(i.personId)} · ${itemTypeLabel(i.type)} · ${i.text}\n`; });
    md += '\n';
  }

  md += exportMonthBlocks(month);

  downloadFile(`${month}.md`, md);
}

function exportPerson(id) {
  const p = data.persons.find(p => p.id === id);
  if (!p) return;

  let md = `# ${p.name}\n\n`;
  md += `**Push-Richtung:** ${p.pushDirection || '—'}\n\n`;

  const meetings = data.meetings.filter(m => m.personId === id).sort((a, b) => (b.date || '').localeCompare(a.date || ''));
  if (meetings.length) {
    md += `## 1:1 Gespräche\n\n`;
    meetings.forEach(m => {
      md += `### ${m.date ? formatDate(m.date) : 'ohne Datum'}\n`;
      if (m.prep) md += `**Vorbereitung:** ${m.prep}\n`;
      if (m.notes) md += `${m.notes}\n`;
      md += '\n';
    });
  }

  const items = data.items.filter(i => i.personId === id && i.status !== 'done');
  if (items.length) {
    md += `## Offene Items\n`;
    items.forEach(i => { md += `- [${itemTypeLabel(i.type)}] ${i.text} (${i.status})\n`; });
    md += '\n';
  }

  const growth = data.items.filter(i => i.personId === id && isGrowthEntry(i)).sort(compareItemsByDateDesc);
  if (growth.length) {
    md += `## Growth Journal\n`;
    growth.forEach(i => { md += `- ${formatDate(i.date)} · ${itemTypeLabel(i.type)}: ${i.text}\n`; });
    md += '\n';
  }

  md += exportPersonBlocks(id);

  downloadFile(`${p.name.toLowerCase().replace(/\s+/g, '-')}.md`, md);
}

function exportMeeting(id) {
  const m = data.meetings.find(m => m.id === id);
  if (!m) return;

  let title = m.type === 'oneOnOne' ? '1:1' : (m.title || 'Meeting');
  if (m.personId) title += ' mit ' + personName(m.personId);

  let md = `# ${title} — ${m.date ? formatDate(m.date) : 'ohne Datum'}\n\n`;
  md += `## Vorbereitung\n${m.prep || '—'}\n\n`;
  md += `## Mitschrift\n${m.notes || '—'}\n`;

  const slugTitle = (m.title || m.type).toLowerCase().replace(/\s+/g, '-');
  const slug = `${slugTitle}-${m.date || 'ohne-datum'}${m.personId ? '-' + personName(m.personId).toLowerCase().replace(/\s+/g, '-') : ''}`;
  downloadFile(`${slug}.md`, md);
}

function exportWins() {
  const wins = data.items.filter(isPersonalWin).sort(compareItemsByDateDesc);
  const highlights = data.items.filter(i => i.type === 'highlight').sort(compareItemsByDateDesc);
  const concerns = data.items.filter(i => i.type === 'concern').sort(compareItemsByDateDesc);

  let md = `# Impact Summary\n\n`;

  if (wins.length) {
    md += `## My Wins (${wins.length})\n`;
    wins.forEach(i => {
      const person = i.personId ? ` (@${personName(i.personId)})` : '';
      md += `- ${formatDate(i.date)}: ${i.text}${person}\n`;
    });
    md += '\n';
  }

  if (highlights.length) {
    md += `## Team Highlights (${highlights.length})\n`;
    highlights.forEach(i => {
      md += `- ${formatDate(i.date)}: ${personName(i.personId)} · ${i.text}\n`;
    });
    md += '\n';
  }

  if (concerns.length) {
    md += `## Team Concerns (${concerns.length})\n`;
    concerns.forEach(i => {
      md += `- ${formatDate(i.date)}: ${personName(i.personId)} · ${i.text}\n`;
    });
  }

  downloadFile('impact-summary.md', md);
}
