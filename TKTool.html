  --badge-note-text: #df69ba;
  --badge-note-bg: #fae8e2;
  --badge-note-border: #e0dcc7;
  --badge-focus-text: #f57d26;
  --badge-focus-bg: #fde3da;

  --stat-todo-bg: #e9f0e9;
  --stat-backlog-bg: #efebd4;

  --quicknotes-bar-border: var(--border);

  --brand-letter-spacing: 0.08em;

  --heavy-font-weight: 700;
  --nav-active-border-width: 2px;
  --row-status-width: 2px;

<style data-source="./styles.css">
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  --interactive-hover-bg: color-mix(in srgb, var(--surface-hover) 82%, var(--accent) 18%);
  --interactive-hover-border: color-mix(in srgb, var(--accent) 58%, var(--border));
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  line-height: 1.4;
  min-height: 100vh;
  font-size: 14px;
}

body,
.header,
.card,
.item,
.badge,
.btn,
button,
input,
select,
textarea,
.quicknotes-bar,
.quicknotes-panel {
  transition: background-color 0.32s ease, background-image 0.32s ease, border-color 0.32s ease, color 0.32s ease, box-shadow 0.32s ease;
}

::selection {
  background: var(--accent);
  color: #fff;
}

.header {
  background: var(--bg-elev);
  border-bottom: var(--border-width) solid var(--border);
  padding: 0 12px;
  position: sticky;
  top: 0;
  z-index: 100;
}

.header-inner {
  max-width: 1180px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  gap: var(--layout-gap);
  height: var(--header-height);
}

.logo {
  font-weight: 600;
  font-size: 13px;
  color: var(--accent);
  letter-spacing: var(--brand-letter-spacing);
  text-transform: uppercase;
  flex-shrink: 0;
}

.nav {
  display: flex;
  gap: calc(var(--control-gap) / 2);
  overflow-x: auto;
  min-width: 0;
  flex: 0 1 auto;
}

.header-search {
  display: flex;
  align-items: center;
  gap: 4px;
  min-width: 0;
  flex: 1 1 240px;
  max-width: 360px;
}

.header-search input,
.view-search input {
  width: 100%;
  min-width: 0;
  background: var(--surface);
  border: var(--border-width) solid var(--border);
  border-radius: var(--control-radius);
  color: var(--text);
  padding: var(--control-padding-y) var(--control-padding-x);
  font: inherit;
  outline: none;
}

.header-search input:focus,
.view-search input:focus {
  border-color: var(--accent);
}

.nav button {
  background: none;
  border: var(--border-width) solid transparent;
  border-left: var(--nav-active-border-width) solid transparent;
  border-radius: var(--control-radius);
  padding: var(--control-padding-y) var(--control-padding-x);
  font-size: 13px;
  color: var(--text-secondary);
  cursor: pointer;
  white-space: nowrap;
  text-transform: lowercase;
  transition: background-color var(--transition-fast), border-color var(--transition-fast), color var(--transition-fast);
}

.nav button:hover {
  background: var(--interactive-hover-bg);
  color: var(--text);
  border-color: var(--interactive-hover-border);
}

.nav button.active {
  background: var(--surface);
  color: var(--accent);
  border-color: var(--border);
  border-left-color: var(--accent);
  font-weight: var(--active-font-weight);
}

.header-actions {
  margin-left: auto;
  display: flex;
  gap: var(--control-gap);
  flex-shrink: 0;
  align-items: center;
}

.header-actions button,
.theme-trigger {
  background: none;
  border: var(--border-width) solid var(--border);
  border-radius: var(--control-radius);
  padding: var(--control-padding-y) var(--control-padding-x);
  font-size: 13px;
  color: var(--text-secondary);
  text-transform: lowercase;
  transition: background-color var(--transition-fast), border-color var(--transition-fast), color var(--transition-fast);
}

.theme-picker {
  position: relative;
  display: inline-flex;
  align-items: center;
}

.header-actions button,
.theme-trigger {
  cursor: pointer;
}

.header-actions button:hover,
.theme-trigger:hover,
.theme-picker.open .theme-trigger {
  border-color: var(--accent);
  color: var(--accent);
  background: var(--interactive-hover-bg);
}

.theme-trigger {
  min-width: 96px;
  height: 38px;
  padding: 0 12px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  position: relative;
}

.theme-trigger-icon {
  font-size: 17px;
  line-height: 1;
  transform: translateY(-1px);
}

.theme-trigger-label {
  font-size: 11px;
  color: inherit;
  letter-spacing: var(--label-letter-spacing);
  text-transform: lowercase;
}

.theme-trigger-badge {
  position: absolute;
  top: -3px;
  right: -3px;
  width: 9px;
  height: 9px;
  border-radius: 50%;
  background: var(--warning);
  border: 2px solid var(--bg);
  box-sizing: content-box;
}

.theme-option-swatch {
  background: linear-gradient(135deg, var(--theme-swatch-bg) 0 50%, var(--theme-swatch-accent) 50% 100%);
  border: 1px solid color-mix(in srgb, var(--border) 78%, transparent);
  box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.08);
}

.theme-menu {
  position: absolute;
  top: calc(100% + 6px);
  right: 0;
  width: min(240px, calc(100vw - 24px));
  z-index: 130;
  display: none;
  grid-template-columns: 1fr;
  gap: 8px;
  padding: 8px;
  background: var(--bg-elev);
  border: var(--border-width) solid var(--border);
  border-radius: var(--radius-md);
  box-shadow: var(--shadow-popover);
}

.theme-picker.open .theme-menu {
  display: grid;
}

.theme-option {
  width: 100%;
  display: grid;
  grid-template-columns: 18px minmax(0, 1fr);
  align-items: center;
  gap: 8px;
  border-color: transparent;
  padding: 7px 8px;
  text-align: left;
  color: var(--text-secondary);
}

.theme-option:hover,
.theme-option.active {
  border-color: var(--border);
  color: var(--text);
}

.theme-option:hover { background: var(--interactive-hover-bg); }

.theme-option.active {
  background: var(--accent-light);
  color: var(--accent);
  border-left-color: var(--accent);
  font-weight: var(--active-font-weight);
}

.theme-menu-section {
  display: grid;
  gap: 6px;
}

.theme-menu-label {
  padding: 0 4px;
  font-size: 10px;
  letter-spacing: var(--label-letter-spacing);
  text-transform: uppercase;
  color: var(--text-muted);
}

.theme-menu-divider {
  height: 1px;
  background: var(--border);
  margin: 0 2px;
}

.theme-action {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  background: none;
  border: var(--border-width) solid transparent;
  border-radius: var(--control-radius);
  padding: 7px 8px;
  text-align: left;
  color: var(--text-secondary);
  cursor: pointer;
  font-size: 13px;
  text-transform: lowercase;
}

.theme-action:hover {
  background: var(--interactive-hover-bg);
  border-color: var(--interactive-hover-border);
  color: var(--text);
}

.theme-action-update {
  justify-content: flex-start;
  color: var(--text);
  font-weight: var(--active-font-weight);
}

.theme-action-update:hover {
  border-color: var(--warning);
}

.theme-action-update-dot {
  flex: none;
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--warning);
}

.theme-action-update-version {
  margin-left: auto;
  font-weight: 400;
  color: var(--text-muted);
  text-transform: none;
}

.theme-option-swatch {
  width: 14px;
  height: 14px;
  border-radius: 999px;
}

.theme-option-label {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.main {
  width: min(100%, 1180px);
  margin: 0 auto;
  padding: var(--main-padding-y) var(--main-padding-x) 46px;
}

.main[data-view="overview"],
.main[data-view="search"],
.main[data-view="meetings"],
.main[data-view="reviews"] {
  width: min(100%, 1260px);
}

.main[data-view="planung"],
.main[data-view="team"],
.main[data-view="kontakte"],
.main[data-view="me"] {
  width: min(100%, 1680px);
}

.setup-screen {
  position: fixed;
  inset: 0;
  z-index: 9999;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
  background: color-mix(in srgb, var(--bg) 70%, transparent);
  backdrop-filter: blur(8px) saturate(0.9);
  -webkit-backdrop-filter: blur(8px) saturate(0.9);
}

.setup-shell {
  width: min(100%, 520px);
  display: grid;
  gap: var(--layout-gap);
  box-shadow: var(--shadow-popover);
}

.setup-brand {
  height: var(--header-height);
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 0 12px;
  border-bottom: var(--border-width) solid var(--border);
}

.setup-panel {
  background: var(--surface);
  border: var(--border-width) solid var(--border);
  border-left: var(--border-accent-width) solid var(--accent);
  border-radius: var(--radius-md);
  padding: 24px;
  display: grid;
  gap: 14px;
}

.setup-kicker {
  color: var(--text-muted);
  font-size: 10px;
  letter-spacing: var(--label-letter-spacing);
  text-transform: uppercase;
}

.setup-panel h2 {
  color: var(--text);
  font-size: 20px;
  line-height: 1.2;
  font-weight: var(--heavy-font-weight);
}

.setup-panel p {
  color: var(--text-secondary);
  font-size: 13px;
  max-width: none;
}

.setup-actions {
  display: flex;
  flex-wrap: wrap;
  gap: var(--control-gap);
}

.setup-button {
  width: fit-content;
  min-height: 34px;
}

.setup-button[hidden] {
  display: none;
}

.setup-hint {
  border-top: var(--border-width) solid var(--border);
  padding-top: 10px;
  color: var(--text-muted);
  font-size: 12px;
}

.card {
  background: var(--surface);
  border: var(--border-width) solid var(--border);
  border-left: var(--border-accent-width) solid var(--border);
  border-radius: var(--radius-md);
  box-shadow: var(--shadow-card);
  padding: var(--card-padding);
  margin-bottom: var(--stack-gap);
}

.board-todo {
  border-left-color: var(--blue);
  background: linear-gradient(180deg, var(--surface) 0%, var(--board-todo-bg) 100%);
}

.board-backlog {
  border-left-color: var(--text-muted);
  background: linear-gradient(180deg, var(--surface) 0%, var(--board-backlog-bg) 100%);
}

.board-waiting {
  border-left-color: var(--warning);
  background: linear-gradient(180deg, var(--surface) 0%, var(--board-waiting-bg) 100%);
}

.board-done {
  border-left-color: var(--success);
  background: linear-gradient(180deg, var(--surface) 0%, var(--board-done-bg) 100%);
}

.board-todo .card-title { color: var(--blue); }
.board-backlog .card-title { color: var(--text-secondary); }
.board-waiting .card-title { color: var(--warning); }
.board-done .card-title { color: var(--success); }

.overview-board {
  display: grid;
  grid-template-columns: repeat(4, minmax(220px, 1fr));
  gap: var(--layout-gap);
  align-items: start;
}

.overview-board .card {
  margin-bottom: 0;
}

.task-sections {
  display: grid;
  gap: var(--stack-gap);
}

.task-table-card {
  padding: 0;
  overflow: hidden;
}

.task-table-card .card-header {
  padding: 10px 10px 0;
}

.task-table-wrap {
  overflow-x: auto;
}

.task-table {
  width: 100%;
  border-collapse: collapse;
  table-layout: fixed;
  font-size: 13px;
}

.task-table th,
.task-table td {
  padding: var(--table-padding-y) var(--table-padding-x);
  border-top: var(--border-width) solid var(--border);
  text-align: left;
  vertical-align: middle;
}

.task-table th {
  color: var(--text-muted);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: var(--label-letter-spacing);
  text-transform: uppercase;
  background: var(--bg-elev);
  white-space: nowrap;
}

.task-table tbody tr:hover { background: var(--interactive-hover-bg); }
.task-table tbody tr.is-done { opacity: 0.68; }
.task-table tbody tr.task-table-done-start td {
  border-top: var(--border-accent-width) solid var(--success);
  box-shadow: var(--task-done-shadow);
}
.task-table tbody tr.task-table-row-todo { box-shadow: inset var(--row-status-width) 0 0 var(--blue); }
.task-table tbody tr.task-table-row-backlog { box-shadow: inset var(--row-status-width) 0 0 var(--text-muted); }
.task-table tbody tr.task-table-row-waiting { box-shadow: inset var(--row-status-width) 0 0 var(--warning); }
.task-table tbody tr.task-table-row-done { box-shadow: inset var(--row-status-width) 0 0 var(--success); }
.task-table tbody tr.task-table-row-past-due { box-shadow: inset var(--row-danger-width) 0 0 var(--danger); }
.task-table th:nth-child(1), .task-table td:nth-child(1) { width: auto; }
.task-table th:nth-child(2), .task-table td:nth-child(2) { width: 164px; }
.task-table th:nth-child(3), .task-table td:nth-child(3) { width: 84px; white-space: nowrap; }
.task-table th:nth-child(4), .task-table td:nth-child(4) { width: 92px; white-space: nowrap; }
.task-table-task,
.task-table-notes { cursor: pointer; }
.task-table-task,
.task-table-notes,
.task-table-link,
.task-table-date { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.task-table tbody tr.is-done .task-table-task { text-decoration: line-through; color: var(--text-muted); }
.task-table tbody tr.task-table-row-past-due .task-table-date {
  color: var(--danger);
  font-weight: 700;
}
.task-table-notes { color: var(--text-muted); padding-left: 17px; min-height: 1.2em; font-size: 12px; }
.task-table-notes.is-empty { visibility: hidden; }
.task-table-task-cell { cursor: pointer; }
.task-table-task { font-weight: 700; margin-bottom: 3px; display: flex; align-items: center; gap: 8px; color: var(--text); }
.task-status-dot { width: 8px; height: 8px; border-radius: 999px; flex-shrink: 0; }
.task-status-dot-backlog { background: var(--text-muted); }
.task-status-dot-todo { background: var(--blue); }
.task-status-dot-waiting { background: var(--warning); }
.task-status-dot-done { background: var(--success); }
.task-table-muted { color: var(--text-muted); font-size: 12px; }
.task-table-link .item-link-chip { max-width: 100%; overflow: hidden; text-overflow: ellipsis; }
.task-table-date { font-variant-numeric: tabular-nums; display: inline-block; }
.task-table-actions { text-align: right; }
.task-table-action-group { display: inline-flex; align-items: center; gap: 2px; }
.task-table-action-group button {
  background: none;
  border: 1px solid transparent;
  cursor: pointer;
  padding: 2px 4px;
  color: var(--text-muted);
  font-size: 12px;
}
.task-table-action-group button:hover { background: var(--interactive-hover-bg); color: var(--text); border-color: var(--interactive-hover-border); }
.task-section { border-left-color: var(--border); }
.task-todo { border-left-color: var(--blue); }
.task-backlog { border-left-color: var(--text-muted); }
.task-waiting { border-left-color: var(--warning); }
.task-done { border-left-color: var(--success); }

.card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
}

.card-title {
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: var(--label-letter-spacing);
  color: var(--text-secondary);
}

.info-chip {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 16px;
  height: 16px;
  border: var(--border-width) solid var(--border);
  border-radius: var(--control-radius);
  color: var(--text-muted);

  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 10px;
}

.person-avatar {
  width: 30px;
  height: 30px;
  border-radius: 0;
  border: 1px solid var(--accent);
  background: transparent;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 700;
  color: var(--accent);
}

.growth-list {
  display: grid;
  gap: 4px;
}

.growth-entry {
  display: grid;
  grid-template-columns: 64px auto 1fr;
  gap: 10px;
  align-items: center;
  padding: 6px 8px;
  border: 1px solid var(--border);
  border-left: 2px solid transparent;
  background: var(--surface);
  font-size: 13px;
  cursor: pointer;
}

.growth-entry:hover {
  background: var(--interactive-hover-bg);
}

.growth-highlight {
  border-left-color: #4e8d68;
}

.growth-concern {
  border-left-color: #c58943;
}

.growth-date {
  color: var(--text-muted);
  font-size: 12px;
}

.growth-text {
  color: var(--text);
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.segmented-toggle {
  display: inline-grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 4px;
  padding: 4px;
  border: 1px solid var(--border);
  background: var(--surface);
  margin-bottom: 12px;
}

.capture-mode-toggle {
  grid-template-columns: repeat(3, minmax(0, 1fr));
}

.segmented-toggle-btn {
  border: none;
  background: transparent;
  color: var(--text-secondary);
  padding: 9px 12px;
  font-size: 12px;
  font-weight: 700;
  text-transform: lowercase;
  cursor: pointer;
}

.segmented-toggle-btn.active {
  background: var(--interactive-hover-bg);
  color: var(--text);
}

.impact-month {
  margin-bottom: 12px;
  padding: 12px;
  background: var(--surface);
}

.impact-month-header {
  display: flex;
  justify-content: space-between;
  gap: 16px;
  align-items: flex-start;
}

.impact-month-kicker,
.impact-month-summary {
  color: var(--text-muted);
  font-size: 11px;
}

.impact-month-title {
  font-size: 18px;
  font-weight: 700;
  margin-top: 2px;
}

.impact-month-progress {
  height: 5px;
  background: var(--bg-elev);
  margin-top: 10px;
  overflow: hidden;
}

.impact-month-progress-bar {
  height: 100%;
  background: var(--accent);
}

.impact-month-grid {
  display: grid;
  grid-template-columns: minmax(0, 1fr) minmax(220px, 0.42fr);
  gap: 10px;
  margin-top: 10px;
  align-items: start;
}

.impact-month-column {
  display: grid;
  gap: 8px;
  align-content: start;
  align-self: start;
}

.impact-month-column-head {
  font-size: 12px;
  font-weight: 700;
  text-transform: lowercase;
  color: var(--text-secondary);
}

.impact-stream {
  display: grid;
  gap: 6px;
  align-content: start;
  grid-auto-rows: max-content;
}

.impact-entry {
  display: grid;
  grid-template-columns: 52px auto 1fr 12px;
  gap: 10px;
  align-items: center;
  align-self: start;
  width: 100%;
  border: 1px solid var(--border);
  border-left: 2px solid var(--border);
  background: var(--bg-elev);
  padding: 8px 10px;
  text-align: left;
  cursor: pointer;
  position: relative;
  overflow: hidden;
}

.impact-entry:hover {
  background: var(--interactive-hover-bg);
  border-color: var(--accent);
}

.impact-entry-personal { border-left: 2px solid #c24c8f; }
.impact-entry-highlight { border-left: 2px solid #4e8d68; }
.impact-entry-concern { border-left: 2px solid #c58943; }

.impact-entry-date {
  color: var(--text-muted);
  font-size: 12px;
}

.impact-entry-text {
  color: var(--text);
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.impact-entry-pulse {
  width: 8px;
  height: 8px;
  border-radius: 999px;
  justify-self: end;
}

.impact-entry-personal .impact-entry-pulse { background: #c24c8f; }
.impact-entry-highlight .impact-entry-pulse { background: #4e8d68; }
.impact-entry-concern .impact-entry-pulse { background: #c58943; }

.impact-person-strip {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 10px;
}

.impact-person-strip-panel {
  margin-top: 0;
  align-content: start;
}

.impact-person-chip {
  display: inline-grid;
  grid-template-columns: auto 1fr;
  align-items: center;
  gap: 10px;
  padding: 8px 12px 8px 8px;
  border: 1px solid var(--border);
  background: var(--bg-elev);
  cursor: pointer;
  color: var(--text);
}

.impact-person-chip:hover {
  background: var(--interactive-hover-bg);
  border-color: var(--accent);
}

.impact-person-copy {
  display: grid;
  gap: 2px;
  text-align: left;
}

.impact-person-name {
  font-weight: 600;
}

.impact-person-metrics {
  font-size: 12px;
  display: inline-flex;
  align-items: center;
  gap: 4px;
}

.impact-metric-positive {
  color: #4e8d68;
  font-weight: 700;
}

.impact-metric-negative {
  color: #c58943;
  font-weight: 700;
}

.impact-metric-sep {
  color: var(--text-muted);
}

@media (max-width: 900px) {
  .impact-month-header,
  .impact-month-grid {
    grid-template-columns: 1fr;
    display: grid;
  }

  .impact-month-header {
    gap: 10px;
  }

  .month-close-grid {
    grid-template-columns: 1fr;
  }
}

@media (max-width: 700px) {
  .month-reflection-header,
  .month-close-actions {
    display: grid;
    gap: 8px;
  }
}

.back-btn {
  background: none;
  border: none;
  cursor: pointer;
  color: var(--text-muted);
  font-size: 12px;
  padding: 4px 0;
  margin-bottom: 8px;
  display: inline-flex;
  align-items: center;
  gap: 4px;
}

.back-btn:hover { color: var(--accent); }

.empty-state {
  text-align: center;
  padding: 22px 8px;
  color: var(--text-muted);
}

.empty-state-icon { font-size: 16px; margin-bottom: 4px; }
.empty-state-text { font-size: 12px; }

.month-selector {
  display: flex;
  align-items: center;
  gap: 2px;
  border: var(--border-width) solid var(--border);
  border-radius: var(--control-radius);
  padding: 2px;
  background: var(--bg-elev);
  width: 100%;
  box-sizing: border-box;
}

.month-selector button {
  background: none;
  border: var(--border-width) solid var(--border);
  border-radius: var(--control-radius);
  padding: 3px 6px;
  cursor: pointer;
  font-size: 12px;
  color: var(--text-secondary);
  transition: border-color var(--transition-fast), color var(--transition-fast), background-color var(--transition-fast);
}

.month-selector button:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: var(--interactive-hover-bg);
}

.month-label {
  flex: 1 1 auto;
  font-weight: 600;
  font-size: 13px;
  min-width: 0;
  text-align: center;
  text-transform: lowercase;
}

.kbd {
  display: inline-block;
  padding: 1px 4px;
  background: var(--bg-elev);
  border: var(--border-width) solid var(--border);
  border-radius: var(--badge-radius);
  font-size: 11px;
  font-family: monospace;
  color: var(--text-muted);
}

.toast {
  position: fixed;
  bottom: 90px;
  right: 10px;
  max-width: min(520px, calc(100vw - 20px));
  background: var(--surface);
  color: var(--text);
  border: var(--border-width) solid var(--border);
  border-left: var(--border-accent-width) solid var(--accent);
  padding: var(--control-padding-y) var(--control-padding-x);
  border-radius: var(--radius-md);
  box-shadow: var(--shadow-float);
  font-size: 12px;
  z-index: 400;
  opacity: 0;
  transform: translateY(10px);
  transition: opacity var(--transition-fast), transform var(--transition-fast);
  pointer-events: none;
}

.toast.show { opacity: 1; transform: translateY(0); }

.toast.toast-error {
  border-color: var(--danger);
  border-left-color: var(--danger);
  background: var(--danger-light);
}

/* Update banner */
.theme-menu-version {
  padding: 2px 4px 0;
  font-size: 10px;
  letter-spacing: var(--label-letter-spacing);
  color: var(--text-muted);
}

.update-banner {
  position: fixed;
  bottom: 90px;
  left: 10px;
  max-width: min(440px, calc(100vw - 20px));
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--surface);
  color: var(--text);
  border: var(--border-width) solid var(--border);
  border-left: var(--border-accent-width) solid var(--warning);
  padding: var(--control-padding-y) var(--control-padding-x);
  border-radius: var(--radius-md);
  box-shadow: var(--shadow-float);
  font-size: 12px;
  z-index: 401;
}

.update-banner-dot {
  flex: none;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--warning);
}

.update-banner-body {
  display: flex;
  flex-direction: column;
  gap: 2px;
  min-width: 0;
}

.update-banner-title {
  font-weight: var(--active-font-weight);
  text-transform: lowercase;
}

.update-banner-version {
  margin-left: 6px;
  color: var(--text-muted);
  font-weight: 400;
}

.update-banner-path {
  color: var(--text-muted);
  font-size: 11px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.update-banner-action {
  flex: none;
  background: none;
  border: var(--border-width) solid var(--border);
  border-radius: var(--control-radius);
  padding: 5px 10px;
  color: var(--text-secondary);
  cursor: pointer;
  font-size: 12px;
  text-transform: lowercase;
}

.update-banner-action:hover {
  background: var(--interactive-hover-bg);
  border-color: var(--accent);
  color: var(--text);
}

.update-banner-close {
  flex: none;
  background: none;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  font-size: 16px;
  line-height: 1;
  padding: 0 2px;
}

.update-banner-close:hover { color: var(--text); background: var(--interactive-hover-bg); }

/* QuickNotes */
.quicknotes {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 150;
  display: flex;
  flex-direction: column;
  pointer-events: auto;
}

.quicknotes-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: calc(var(--header-height) - 12px);
  padding: 0 12px;
  background-color: var(--quicknotes-bar-bg);
  background-image: var(--quicknotes-bar-gradient);
  border-top: var(--border-width) solid var(--quicknotes-bar-border);
  border-left: var(--border-accent-width) solid var(--accent);
  cursor: pointer;
  pointer-events: auto;
  transition: background-color var(--transition-fast), background-image var(--transition-fast);
  user-select: none;
}

.quicknotes-bar:hover {
  background-color: var(--quicknotes-bar-bg-hover);
  background-image: var(--quicknotes-bar-gradient-hover);
  box-shadow: inset 0 0 0 1px var(--interactive-hover-border);
}

.quicknotes-label {
  font-size: 13px;
  font-weight: var(--active-font-weight);
  color: var(--accent);
  text-transform: lowercase;
}

.quicknotes-label-wrap {
  display: flex;
  align-items: center;
  gap: 8px;
}

.quicknotes-indicator {
  display: inline-flex;
  align-items: center;
  min-width: 44px;
  padding: var(--badge-padding-y) var(--badge-padding-x);
  border: var(--border-width) solid var(--quicknotes-indicator-border);
  border-radius: var(--badge-radius);
  background: var(--quicknotes-indicator-bg);
  color: var(--text-secondary);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: var(--label-letter-spacing);
  text-transform: uppercase;
}

.quicknotes-indicator[hidden] {
  display: none;
}

.quicknotes-indicator.has-content {
  border-color: var(--quicknotes-indicator-active-border);
  background: var(--quicknotes-indicator-active-bg);
  color: var(--quicknotes-indicator-active-text);
}

.quicknotes-actions {
  display: flex;
  align-items: center;
  gap: 8px;
}

.quicknotes-capture {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  height: 26px;
  padding: 0 8px;
  border: var(--border-width) solid var(--quicknotes-capture-border);
  border-radius: var(--control-radius);
  background: var(--quicknotes-capture-bg);
  color: var(--text);
  cursor: pointer;
  font: inherit;
  text-transform: lowercase;
}

.quicknotes-capture:hover {
  background: var(--quicknotes-capture-bg-hover);
  border-color: var(--accent);
}

.quicknotes-capture-label {
  color: var(--accent);
  font-size: 13px;
  font-weight: var(--active-font-weight);
}

.quicknotes-kbd {
  color: var(--text-secondary);
  border: var(--border-width) solid var(--border);
  border-radius: var(--badge-radius);
  background: var(--bg-elev);
  padding: 1px 6px;
  font-size: 11px;
  letter-spacing: var(--label-letter-spacing);
  text-transform: uppercase;
}

.quicknotes-panel {
  height: 0;
  overflow: hidden;
  transition: height 0.15s ease;
  pointer-events: none;
  background: var(--bg-elev);
  border-top: var(--border-width) solid var(--border);
}

.quicknotes.open .quicknotes-panel {
  height: min(50vh, 460px);
  pointer-events: auto;
}

.quicknotes.open .quicknotes-bar {
  border-left-color: var(--accent);
}

.quicknotes-editor {
  width: 100%;
  height: 100%;
  padding: 10px 12px;
  border: none;
  outline: none;
  resize: none;
  font-family: 'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
  font-size: 13px;
  line-height: 1.5;
  color: var(--text);
  background: var(--bg-elev);
  caret-color: var(--accent);
}

.quicknotes-editor::placeholder {
  color: var(--text-muted);
}

.quicknotes-editor::selection {
  background: var(--accent);
  color: #fff;
}

/* Move toast up when quicknotes is open */
.quicknotes.open ~ .toast {
  bottom: min(calc(50vh + 90px), 550px);
}

/* ============================================================
   TIMELINE / PLANUNG
   ============================================================ */
.timeline {
  border: 1px solid var(--border);
  background: var(--surface);
  overflow-x: auto;
  overflow-y: hidden;
  font-size: 12px;
  user-select: none;
}

.timeline-dense { font-size: 11px; }

.timeline-compact .tl-header,
.timeline-compact .tl-row {
  grid-template-columns: 140px 1fr;
  min-width: 0;
}

.timeline-compact .tl-body {
  min-width: 0;
}

.timeline-compact .tl-person,
.timeline-compact .tl-person-head {
  padding-left: 6px;
  padding-right: 6px;
}

.timeline-compact .tl-person-name {
  font-size: 10px;
}

.timeline-compact .tl-person-cap {
  font-size: 10px;
}
.timeline-compact .tl-person-cap .tl-cap-days {
  font-size: 11px;
}

.tl-header,
.tl-row {
  display: grid;
  grid-template-columns: 180px 1fr;
  align-items: stretch;
  min-width: 720px;
}

.tl-header {
  border-bottom: 1px solid var(--border);
  background: var(--bg-elev);
  position: sticky;
  top: 0;
  z-index: 2;
}

.tl-person-head,
.tl-cap-head {
  padding: 6px 10px;
  font-size: 11px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  border-right: 1px solid var(--border);
}
.tl-person-head {
  background: var(--bg-elev);
}
.tl-cap-head {
  border-right: none;
  border-left: 1px solid var(--border);
  text-align: right;
  background: var(--bg-elev);
}

.tl-grid-head { display: flex; flex-direction: column; }
.tl-months-row,
.tl-days-row {
  display: grid;
  min-width: 0;
}
.tl-months-row { border-bottom: 1px dashed var(--border); }
.tl-month-cell {
  padding: 4px 6px;
  font-size: 11px;
  color: var(--text-secondary);
  border-right: 1px solid var(--border);
  text-transform: lowercase;
  white-space: nowrap;
  overflow: hidden;
}
.tl-day-cell {
  padding: 3px 0;
  text-align: center;
  font-size: 10px;
  color: var(--text-muted);
  border-right: 1px solid var(--border);
  min-width: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 1px;
  line-height: 1.05;
}

.tl-day-dow {
  font-size: 9px;
  text-transform: none;
}

.tl-day-num {
  font-size: 11px;
  font-weight: 600;
}
.tl-day-cell.tl-week-start {
  border-left: 2px solid color-mix(in srgb, var(--accent) 45%, var(--border));
}
.tl-day-cell.tl-weekend {
  background: var(--weekend-bg);
  box-shadow:
    inset 0 1px 0 var(--weekend-bg-strong),
    inset 0 -1px 0 var(--weekend-border);
  color: var(--weekend-text);
  font-weight: 600;
  opacity: 0.9;
}
.tl-day-cell.tl-today { background: var(--today-bg); color: var(--today-text); font-weight: 700; }

.tl-body {
  position: relative;
  display: grid;
  gap: 14px;
  padding: 12px 0;
  min-width: 720px;
}

.tl-body-today-line {
  position: absolute;
  top: 0.5rem;
  bottom: -0.375rem;
  left: calc(var(--tl-person-col) + (100% - var(--tl-person-col)) * var(--tl-today-frac));
  transform: translateX(-50%);
  width: 0.125rem;
  background: var(--today-line);
  pointer-events: none;
  z-index: 5;
}

.tl-body-today-line::before {
  content: '';
  position: absolute;
  top: -0.25rem;
  left: 50%;
  transform: translateX(-50%);
  width: 0.5rem;
  height: 0.5rem;
  border-radius: 999px;
  background: var(--today-line);
  box-shadow: 0 0 0 0.125rem var(--surface);
}

.tl-row {
  border-bottom: none;
  border: 1px solid var(--border);
  background: color-mix(in srgb, var(--surface) 82%, var(--bg-elev));
  box-shadow: 0 1px 0 rgba(0, 0, 0, 0.04);
  overflow: hidden;
}
/* row-wide support background removed — per-cell highlighting only */

.tl-person {
  padding: 12px 10px;
  border-right: 1px solid var(--border);
  cursor: pointer;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: stretch;
  gap: 4px;
  min-width: 0;
  background: color-mix(in srgb, var(--surface) 88%, var(--bg-elev));
}
.tl-person:hover { background: var(--interactive-hover-bg); }
.tl-person-main,
.tl-person-top {
  display: flex;
  align-items: center;
  gap: 6px;
  min-width: 0;
}
.tl-person-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; min-width: 0; }

.tl-person-cap {
  display: inline-flex;
  align-items: baseline;
  gap: 3px;
  font-size: 11px;
  color: var(--text-muted);
  flex-shrink: 0;
  padding-left: 0;
}
.tl-person-cap .tl-cap-days { font-size: 12px; font-weight: 700; color: var(--text); }
.tl-person-cap .tl-cap-neg { color: var(--danger); }
.tl-person-cap .tl-cap-support { color: var(--warning); font-weight: 600; font-size: 11px; }

.tl-sup-badge {
  background: var(--warning);
  color: var(--bg);
  font-size: 9px;
  padding: 1px 4px;
  letter-spacing: 0.06em;
  font-weight: 700;
  flex-shrink: 0;
}

.tl-track {
  position: relative;
  min-height: var(--tl-track-height, 68px);
  min-width: 0;
  cursor: crosshair;
  background: color-mix(in srgb, var(--surface) 72%, var(--bg-elev));
}
.timeline-dense .tl-track { min-height: var(--tl-track-height, 52px); }

.tl-track-grid,
.tl-track-overlay {
  position: absolute;
  inset: 0;
}

.tl-track-grid {
  display: grid;
  min-height: inherit;
}

.tl-track-overlay {
  pointer-events: none;
  overflow: visible;
}

.tl-insert-lane {
  position: absolute;
  left: 0;
  right: 0;
  display: grid;
  pointer-events: auto;
  z-index: 1;
}

.tl-insert-cell {
  border-right: 1px solid transparent;
  min-width: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  pointer-events: none;
}

.tl-insert-button {
  appearance: none;
  border: 1px solid currentColor;
  border-radius: 999px;
  background: color-mix(in srgb, var(--surface) 88%, transparent);
  color: var(--text-muted);
  cursor: pointer;
  width: 20px;
  height: 20px;
  padding: 0;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: auto;
  font-size: 16px;
  font-weight: 700;
  line-height: 1;
  transition: opacity 0.12s ease, background-color 0.12s ease, color 0.12s ease;
}

.tl-track:hover .tl-insert-button {
  opacity: 0.45;
}

.tl-track.tl-track-creating .tl-insert-button,
.tl-track.tl-track-creating .tl-insert-button:hover,
.tl-track.tl-track-creating .tl-insert-button:focus-visible {
  opacity: 0;
  pointer-events: none;
}

.tl-insert-button:hover,
.tl-insert-button:focus-visible {
  opacity: 1;
  background: color-mix(in srgb, var(--accent) 14%, transparent);
  color: var(--accent);
  outline: none;
}

.tl-cell {
  border-right: 1px solid var(--border);
  min-width: 0;
}
.tl-cell.tl-week-start {
  border-left: 2px solid color-mix(in srgb, var(--accent) 30%, var(--border));
}
.tl-cell.tl-weekend {
  background: linear-gradient(180deg, var(--weekend-bg-strong) 0%, var(--weekend-bg) 100%);
  box-shadow:
    inset 1px 0 0 var(--weekend-border),
    inset 0 1px 0 rgba(255,255,255,0.03);
  opacity: 0.8;
}
.tl-cell.tl-support-cell { background: var(--warning-light); }
.tl-cell.tl-weekend.tl-support-cell {
  background: linear-gradient(180deg, var(--weekend-support-bg-strong) 0%, var(--weekend-support-bg) 100%);
  box-shadow:
    inset 1px 0 0 var(--weekend-support-border),
    inset 0 1px 0 rgba(255,255,255,0.03);
  opacity: 0.82;
}

.tl-block {
  position: absolute;
  top: 4px;
  height: var(--tl-lane-size, 28px);
  margin: 0;
  padding: 3px 6px;
  min-width: 0;
  box-sizing: border-box;
  background: var(--blue);
  color: #fff;
  font-size: 11px;
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  cursor: grab;
  border: 1px solid rgba(0,0,0,0.2);
  z-index: 2;
  display: flex;
  align-items: center;
  gap: 4px;
  pointer-events: auto;
  border-radius: 6px;
}
.tl-block:hover { filter: brightness(1.08); }
.tl-block:active { cursor: grabbing; }

.tl-block-label {
  display: block;
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
}

.tl-block-single {
  z-index: 3;
  box-shadow: 0 1px 4px rgba(0, 0, 0, 0.2);
  padding: 3px 4px;
}

.tl-block-projekt { background: var(--timeline-projekt); }
.tl-block-ticket { background: var(--timeline-ticket); }
.tl-block-incident { background: var(--timeline-incident); }
.tl-block-abwesenheit { background: var(--timeline-abwesenheit); }

.tl-block-done { opacity: 0.45; }
.tl-block-done .tl-block-label { text-decoration: line-through; }
.tl-block-check { flex: 0 0 auto; font-weight: 700; }
.tl-block-overdue { box-shadow: 0 0 0 2px var(--danger); }
.tl-block-swatch-overdue {
  background: transparent;
  border-color: var(--danger);
  box-shadow: 0 0 0 1px var(--danger);
}

.tl-block-preview {
  background: transparent;
  border: 2px dashed var(--accent);
  color: var(--accent);
  text-align: center;
  justify-content: center;
  font-weight: 700;
}

.tl-cap {
  padding: 12px 10px;
  border-left: 1px solid var(--border);
  text-align: right;
  font-size: 11px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 2px;
  background: var(--surface);
}
.tl-cap-days { font-weight: 700; font-size: 14px; color: var(--text); }
.tl-cap-neg { color: var(--danger); }
.tl-cap-sub { color: var(--text-muted); font-size: 10px; text-transform: uppercase; }
.tl-cap-support { color: var(--warning); font-weight: 600; font-size: 11px; }

.tl-legend {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  padding: 10px 4px 0 4px;
  font-size: 11px;
  color: var(--text-muted);
}
.tl-legend-item { display: inline-flex; align-items: center; gap: 5px; }
.tl-block-swatch {
  display: inline-block;
  width: 14px;
  height: 10px;
  border: 1px solid rgba(0,0,0,0.2);
}
.tl-legend-today {
  display: inline-block;
  width: 2px;
  height: 12px;
  background: var(--today-line);
}
.tl-marker-swatch {
  display: inline-block;
  width: 12px;
  height: 12px;
  border-radius: 2px;
  background: linear-gradient(135deg, #ef4444, #3b82f6);
}

.tl-months-row { position: relative; }
.tl-marker-chip {
  position: absolute;
  top: 50%;
  transform: translate(-50%, -50%);
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 1px 6px;
  font-size: 10px;
  line-height: 1.4;
  white-space: nowrap;
  cursor: pointer;
  border-radius: 3px;
  background: var(--surface);
  border: 1px solid var(--border);
  max-width: 160px;
  overflow: hidden;
  text-overflow: ellipsis;
  z-index: 4;
}
.tl-marker-chip:hover { filter: brightness(1.08); }
.tl-marker-dot {
  width: 6px;
  height: 6px;
  border-radius: 999px;
  flex: 0 0 auto;
}
.tl-marker-label { overflow: hidden; text-overflow: ellipsis; }

.tl-day-cell.tl-marker-day { font-weight: 700; }

.marker-swatches {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.marker-swatch {
  position: relative;
  width: 28px;
  height: 28px;
  border-radius: 4px;
  cursor: pointer;
  border: 2px solid transparent;
  box-sizing: border-box;
}
.marker-swatch input { position: absolute; opacity: 0; inset: 0; cursor: pointer; }
.marker-swatch.selected { border-color: var(--text); box-shadow: 0 0 0 2px var(--surface) inset; }

.planung-sort { display: flex; gap: 4px; }

.planung-actions {
  margin-left: auto;
  flex: 0 0 auto;
  justify-self: end;
  display: flex;
  width: auto;
}

.planung-actions .btn { width: auto; }

.form-group-parked { flex: 0 0 auto; display: flex; align-items: flex-end; }
.form-group-parked .form-label {
  display: flex;
  align-items: center;
  gap: 6px;
  margin: 0;
  padding-bottom: 8px;
  cursor: pointer;
  white-space: nowrap;
}
.form-input[readonly] { opacity: 0.5; }

.planung-overdue-btn { color: var(--danger); border-color: var(--danger); }
.planung-overdue-btn:hover { color: var(--danger); border-color: var(--danger); filter: brightness(1.1); }
.planung-overdue-btn.active {
  color: var(--danger);
  border-color: var(--danger);
  border-left: 2px solid var(--danger);
}

.planung-overdue-panel {
  border: 1px solid var(--border);
  border-left: 2px solid var(--danger);
  background: var(--surface);
  margin-bottom: 12px;
}
.planung-overdue-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  padding: 6px 10px;
  font-size: 12px;
  border-bottom: 1px solid var(--border);
}
.planung-overdue-row:last-child { border-bottom: none; }
.planung-overdue-info {
  display: flex;
  align-items: baseline;
  gap: 8px;
  min-width: 0;
  cursor: pointer;
}
.planung-overdue-info:hover .planung-overdue-label { color: var(--accent); }
.planung-overdue-person { font-weight: 600; flex: 0 0 auto; }
.planung-overdue-label {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.planung-overdue-date { color: var(--danger); flex: 0 0 auto; font-size: 11px; }
.planung-overdue-actions { display: flex; gap: 6px; flex: 0 0 auto; }

.planung-parked {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 6px;
  padding: 0 0 10px;
  font-size: 11px;
}
.planung-parked-head { color: var(--text-muted); text-transform: lowercase; }
.planung-parked-chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 2px 8px;
  font-size: 11px;
  border: 1px dashed var(--border);
  border-radius: 3px;
  background: var(--surface);
  color: var(--text-secondary);
  cursor: pointer;
}
.planung-parked-chip:hover { border-color: var(--accent); color: var(--accent); background: var(--interactive-hover-bg); }
.planung-parked-person { font-weight: 600; }

.person-blocks { padding: 10px 2px; }
.person-blocks-head { font-size: 12px; font-weight: 600; margin-bottom: 6px; }
.person-blocks-sub {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 10px;
  color: var(--text-muted);
  text-transform: lowercase;
  margin: 8px 0 4px;
}
.person-blocks-more {
  border: none;
  background: transparent;
  padding: 0;
  font-size: 10px;
  color: var(--accent);
  cursor: pointer;
  text-transform: lowercase;
}
.person-blocks-more:hover { text-decoration: underline; }
.person-block-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 4px 6px;
  font-size: 12px;
  cursor: pointer;
  border-radius: 3px;
}
.person-block-row:hover { background: var(--interactive-hover-bg); }
.person-block-row.person-block-done { opacity: 0.5; }
.person-block-row.person-block-done .person-block-label { text-decoration: line-through; }
.person-block-label {
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.person-block-range { color: var(--text-muted); font-size: 11px; flex: 0 0 auto; }
.person-block-overdue {
  color: var(--danger);
  border: 1px solid var(--danger);
  border-radius: 3px;
  padding: 0 5px;
  font-size: 10px;
  text-transform: lowercase;
  flex: 0 0 auto;
}
.person-block-check {
  margin-left: auto;
  flex: 0 0 auto;
  width: 22px;
  height: 22px;
  border: 1px solid var(--border);
  border-radius: 3px;
  background: transparent;
  color: var(--text-muted);
  cursor: pointer;
  font-size: 12px;
  line-height: 1;
}
.person-block-check:hover { border-color: var(--success, var(--accent)); color: var(--success, var(--accent)); background: var(--interactive-hover-bg); }
.person-block-checked { margin-left: auto; color: var(--text-muted); flex: 0 0 auto; }

.planung-info {
  display: flex;
  flex-wrap: wrap;
  gap: 14px;
  padding: 10px 2px;
  font-size: 12px;
  color: var(--text-secondary);
  border-bottom: 1px dashed var(--border);
  margin-bottom: 10px;
}

.sudo-locked-placeholder {
  position: relative;
  min-height: 64px;
  border: 1px dashed var(--border);
  background: color-mix(in srgb, var(--surface) 88%, var(--text) 12%);
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 12px;
}

.sudo-locked-scrim {
  position: absolute;
  inset: 10px;
  display: grid;
  gap: 8px;
  filter: blur(4px);
  opacity: .55;
}

.sudo-locked-scrim span {
  display: block;
  height: 12px;
  max-width: 100%;
  background: var(--border);
}

.sudo-locked-scrim span:nth-child(1) { width: 72%; }
.sudo-locked-scrim span:nth-child(2) { width: 92%; }
.sudo-locked-scrim span:nth-child(3) { width: 58%; }

.sudo-locked-message {
  position: relative;
  z-index: 1;
  display: inline-flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  text-align: center;
  color: var(--text-secondary);
  font-size: 12px;
  line-height: 1.3;
}

.sudo-locked-message strong {
  color: var(--text);
  font-size: 13px;
  font-weight: 700;
}

.support-editor {
  margin-top: 12px;
  padding-top: 10px;
  border-top: 1px dashed var(--border);
}
.support-editor-head {
  font-size: 11px;
  text-transform: uppercase;
  color: var(--text-muted);
  letter-spacing: 0.06em;
  margin-bottom: 6px;
}
.support-months-list {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 8px;
}
.support-month-chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 3px 8px;
  background: var(--warning-light);
  color: var(--warning);
  border: 1px solid var(--border);
  font-size: 11px;
}
.support-month-chip button {
  background: none;
  border: none;
  color: var(--warning);
  cursor: pointer;
  font-size: 11px;
  padding: 0;
}
.support-add { display: flex; gap: 6px; align-items: center; }
.support-add input { max-width: 180px; }

/* ============================================================
   Meetings split view
   ============================================================ */
.meetings-layout {
  display: grid;
  grid-template-columns: minmax(280px, 340px) minmax(0, 1fr);
  gap: 12px;
  align-items: start;
}
.meetings-sidebar,
.meetings-detail-panel,
.meetings-list-panel { margin-bottom: 0; }
.meetings-sidebar {
  padding: 0;
  max-height: calc(100vh - 220px);
  overflow-y: auto;
  overflow-x: hidden;
}
.meetings-list-panel {
  padding: 0;
  overflow-x: hidden;
}
.meetings-list-panel .meetings-sidebar-controls {
  border-bottom-color: color-mix(in srgb, var(--border) 72%, var(--accent) 28%);
}
.meetings-list-panel .meetings-sidebar-head {
  grid-template-columns: minmax(120px, .4fr) minmax(260px, 1fr);
  align-items: end;
}
.meetings-list-panel .meetings-result-line span {
  font-size: 28px;
}
.meetings-list-panel .meeting-list-row {
  grid-template-columns: 42px minmax(0, 1fr);
  gap: 12px;
  padding: 10px 12px;
}
.meetings-list-panel .meeting-list-datebox {
  width: 42px;
  min-height: 44px;
}
.meetings-list-panel .meeting-list-datebox-day {
  font-size: 16px;
}
.meetings-list-panel .meeting-list-title {
  font-size: 14px;
  font-weight: 650;
}
.meetings-list-panel .meeting-list-excerpt {
  max-width: 980px;
}
.meetings-list-panel .meeting-list-row[data-peek]:hover::after {
  display: none;
}
.meetings-sidebar-controls {
  position: sticky;
  top: 0;
  z-index: 3;
  background: var(--bg-elev);
  border-bottom: 1px solid var(--border);
}
.meetings-sidebar-head {
  display: grid;
  gap: 6px;
  padding: 10px;
  border-bottom: 1px solid var(--border);
  background: color-mix(in srgb, var(--bg-elev) 92%, var(--surface));
}
.meetings-result-line {
  display: flex;
  align-items: baseline;
  gap: 5px;
  font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  line-height: 1;
}
.meetings-result-line span {
  color: var(--text);
  font-size: 22px;
  font-weight: 900;
}
.meetings-result-line strong,
.meetings-result-line em {
  color: var(--text-muted);
  font-size: 11px;
  font-style: normal;
  font-weight: 700;
  text-transform: lowercase;
}
.meetings-sidebar-stats {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 4px;
}
.meetings-sidebar-stats span {
  min-width: 0;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text-secondary);
  padding: 3px 5px;
  font-size: 10px;
  font-weight: 700;
  font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  text-align: center;
  white-space: nowrap;
}
.meeting-range-tabs {
  display: grid;
  grid-template-columns: repeat(5, minmax(0, 1fr));
  border-top: 1px solid var(--border);
  background: var(--bg-elev);
}
.meeting-range-tabs button {
  min-width: 0;
  border: 0;
  border-right: 1px solid var(--border);
  background: transparent;
  color: var(--text-muted);
  cursor: pointer;
  font: inherit;
  font-size: 10px;
  font-weight: 800;
  line-height: 1.1;
  padding: 8px 4px;
  text-transform: lowercase;
  overflow-wrap: anywhere;
}
.meeting-range-tabs button:last-child { border-right: 0; }
.meeting-range-tabs button:hover {
  background: var(--interactive-hover-bg);
  color: var(--text);
}
.meeting-range-tabs button.active {
  background: var(--accent-light);
  color: var(--accent);
}
.meetings-sidebar-empty {
  padding: 14px;
  color: var(--text-muted);
  font-size: 13px;
}
.meeting-list-group + .meeting-list-group { border-top: 1px solid var(--border); }
.meeting-list-group-label {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  padding: 10px 10px 8px;
  font-size: 11px;
  letter-spacing: .08em;
  text-transform: lowercase;
  color: var(--text-secondary);
  background:
    linear-gradient(180deg, color-mix(in srgb, var(--bg-elev) 88%, var(--accent) 12%), var(--bg-elev));
  border-top: 1px solid color-mix(in srgb, var(--border) 72%, var(--accent) 28%);
  border-bottom: 1px solid color-mix(in srgb, var(--border) 78%, var(--accent) 22%);
  box-shadow: inset 0 1px 0 color-mix(in srgb, white 40%, transparent);
}
.meeting-list-group-count {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 20px;
  height: 18px;
  padding: 0 6px;
  border-radius: 999px;
  border: 1px solid color-mix(in srgb, var(--border) 60%, var(--accent) 40%);
  background: color-mix(in srgb, var(--surface) 82%, var(--accent) 18%);
  color: var(--text-secondary);
  font-size: 10px;
  font-weight: 700;
  line-height: 1;
}
.meeting-list-row {
  position: relative;
  padding: 8px 10px;
  border-left: 2px solid transparent;
  cursor: pointer;
  display: grid;
  grid-template-columns: 34px minmax(0, 1fr);
  gap: 8px;
  align-items: start;
}
.meeting-list-row + .meeting-list-row { border-top: 1px solid var(--border); }
.meeting-list-row:hover {
  background: var(--interactive-hover-bg);
  box-shadow: inset 2px 0 0 var(--accent);
}
.meeting-list-row.active {
  background: var(--accent-light);
  border-left-color: var(--accent);
}
.meeting-list-datebox {
  display: grid;
  place-items: center;
  width: 34px;
  min-height: 38px;
  border: 1px solid var(--border);
  background: var(--surface);
  font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  line-height: 1;
}
.meeting-list-row.active .meeting-list-datebox {
  border-color: var(--accent);
  color: var(--accent);
}
.meeting-list-datebox-day {
  color: var(--text);
  font-size: 14px;
  font-weight: 900;
}
.meeting-list-datebox-weekday {
  color: var(--text-muted);
  font-size: 9px;
  font-weight: 800;
  text-transform: lowercase;
}
.meeting-list-main {
  display: grid;
  gap: 3px;
  min-width: 0;
}
.meeting-list-head {
  display: flex;
  align-items: baseline;
  gap: 6px;
  min-width: 0;
}
.meeting-list-followups {
  margin-left: auto;
  display: inline-flex;
  align-items: center;
  gap: 4px;
  flex-shrink: 0;
}
.meeting-list-type {
  font-size: 10px;
  letter-spacing: .04em;
  color: var(--text-muted);
  text-transform: lowercase;
  flex-shrink: 0;
  font-family: ui-monospace, monospace;
}
.meeting-list-title {
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  flex: 1;
  min-width: 0;
}
.meeting-list-meta {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  color: var(--text-muted);
}
.meeting-list-person { color: var(--accent); }
.meeting-list-count {
  font-family: ui-monospace, monospace;
  opacity: .7;
}
.meeting-list-excerpt {
  color: var(--text-secondary);
  font-size: 11px;
  line-height: 1.35;
  overflow: hidden;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
}
.meeting-list-row[data-peek]:hover::after {
  content: attr(data-peek);
  position: absolute;
  left: calc(100% + 6px);
  top: 4px;
  z-index: 20;
  white-space: pre-wrap;
  background: var(--bg-elev);
  border: 1px solid var(--border);
  padding: 8px 10px;
  max-width: 320px;
  font-size: 12px;
  color: var(--text);
  box-shadow: 0 4px 14px rgba(0,0,0,.3);
  pointer-events: none;
  border-radius: 4px;
}
.meetings-detail-header {
  display: flex;
  flex-direction: column;
  gap: 8px;
  padding-bottom: 10px;
  margin-bottom: 10px;
  border-bottom: 1px solid var(--border);
}
.meetings-detail-title-row {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 10px;
  flex-wrap: wrap;
}
.meetings-detail-date {
  color: var(--text-muted);
  font-size: 13px;
  font-family: ui-monospace, monospace;
}
.meetings-detail-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.meetings-empty-panel {
  padding: 30px 10px;
  text-align: center;
  color: var(--text-muted);
}
.meetings-empty-title {
  font-size: 15px;
  color: var(--text);
  margin-bottom: 4px;
}
.meetings-empty-sub {
  font-size: 12px;
  margin-bottom: 20px;
}
.meetings-empty-quickcards {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 8px;
  max-width: 420px;
  margin: 0 auto;
}
.meetings-empty-card {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 3px;
  padding: 10px 12px;
  background: var(--bg-elev);
  border: 1px solid var(--border);
  color: var(--text);
  text-align: left;
  cursor: pointer;
  border-radius: 4px;
}
.meetings-empty-card:hover { border-color: var(--accent); background: var(--interactive-hover-bg); }
.meetings-empty-card-label {
  font-size: 10px;
  letter-spacing: .05em;
  color: var(--text-muted);
  text-transform: lowercase;
}
.meetings-empty-card-title {
  font-size: 13px;
  font-weight: 500;
}
.meetings-empty-card-date {
  font-size: 11px;
  color: var(--text-muted);
  font-family: ui-monospace, monospace;
}
.meetings-empty-card-new { border-style: dashed; }

@media (max-width: 980px) {
  .overview-board { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .review-grid { grid-template-columns: 1fr; }
  .review-due-card { grid-column: auto; }
  .review-due-sections { grid-template-columns: 1fr; }
  .stats-row { grid-template-columns: 1fr; }
  .stats-inline-main { grid-template-columns: repeat(4, minmax(0, 1fr)); }
  .stats-inline-meta { grid-template-columns: repeat(2, minmax(0, 1fr)); width: auto; min-width: 0; margin-left: 0; }
  .header-inner { height: auto; padding: 8px 0; flex-wrap: wrap; }
  .header-search { order: 3; width: 100%; max-width: none; }
  .team-layout,
  .team-detail-grid,
  .meetings-layout { grid-template-columns: 1fr; }
  .meetings-sidebar { max-height: none; }
  .meetings-sidebar-controls,
  .meeting-list-group-label { position: static; }
  .meetings-list-panel .meetings-sidebar-head { grid-template-columns: 1fr; }
  .meeting-list-row[data-peek]:hover::after { display: none; }
  .oneonone-carryover-grid { grid-template-columns: 1fr; }
}

@media (max-width: 640px) {
  .header-inner { padding: 0 8px; gap: 8px; }
  .nav button { padding: 5px 7px; font-size: 12px; }
  .main { padding: 8px; }
  .overview-board { grid-template-columns: 1fr; }
  .overview-toolbar-main { grid-template-columns: 1fr; }
  .overview-toolbar-start,
  .overview-actions,
  .overview-actions-menu { width: 100%; }
  .overview-actions-menu summary { justify-content: center; }
  .overview-actions-menu-panel { left: 0; right: auto; width: calc(100% - 14px); }
  .view-toggle { width: 100%; }
  .view-toggle-btn { flex: 1 1 0; }
  .form-row { flex-direction: column; }
  .person-grid { grid-template-columns: 1fr; }
  .header-actions { display: flex; }
  .header-actions > button { display: none; }
  .stats-inline-main { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .stats-inline-meta { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .month-label { min-width: 110px; }
  .view-search { min-width: 100%; }
  .overview-search-toggle { justify-self: stretch; }
  .overview-meta { justify-self: start; }
  .review-due-summary { grid-template-columns: 1fr; }
  .review-row { align-items: flex-start; }
  .oneonone-carryover-signal { grid-template-columns: 42px minmax(0, 1fr); }
  .oneonone-carryover-signal .badge { justify-self: start; }
  .oneonone-carryover-text { grid-column: 1 / -1; }
  .tf-head { flex-direction: column; align-items: stretch; }
  .tf-metrics { grid-template-columns: 1fr; }
  .review-row-side { align-items: flex-start; min-width: 0; }
  .team-detail-stats { grid-template-columns: 1fr; }
  .team-detail-topline { align-items: flex-start; }
  .team-detail-focus-line { align-items: flex-start; }
  .theme-trigger {
    min-width: 42px;
    padding: 0 10px;
  }
  .theme-trigger-label {
    display: none;
  }
}

const APP_VERSION = '1.0.12';
