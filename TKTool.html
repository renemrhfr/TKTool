  paper: ['#f7f7f4', '#111111'],
  nord: ['#2e3440', '#88c0d0'],
  switch: ['#ebebeb', '#e60012'],
  matrix: ['#030703', '#38b84a'],
  serum: ['#121820', '#75d64b'],
};

// Surface runtime failures in the app as well as in DevTools. This is
// intentionally installed from the first script so errors in later scripts
// cannot fail silently.
let lastUiError = { message: '', at: 0 };

function uiToast(message, duration = 2000, kind = 'info') {
  if (typeof window.toast === 'function') {
    window.toast(message, duration, kind);
    return;
  }
  const el = document.getElementById('toast');
  if (!el) return;
  el.textContent = message;
  el.classList.toggle('toast-error', kind === 'error');
  el.setAttribute('role', kind === 'error' ? 'alert' : 'status');
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), duration);
}

function errorMessage(error) {
  if (error && typeof error.message === 'string' && error.message) return error.message;
  if (typeof error === 'string') return error;
  try { return JSON.stringify(error); } catch { return String(error); }
}

function reportUiError(context, error) {
  const detail = errorMessage(error) || 'Unbekannter Fehler';
  const message = `⚠ ${context}: ${detail}`.slice(0, 320);
  const now = Date.now();
  if (lastUiError.message === message && now - lastUiError.at < 2000) return;
  lastUiError = { message, at: now };
  uiToast(message, 8000, 'error');
}

window.addEventListener('error', event => {
  reportUiError('JavaScript-Fehler', event.error || event.message);
});

window.addEventListener('unhandledrejection', event => {
  reportUiError('Unbehandelter Fehler', event.reason);
});

const defaultData = () => ({
  items: [],
  persons: [],
  meetings: [],
  focuses: [],
  dashboardLinks: [],
  monthReviews: [],
  blocks: [],
  markers: [],
});

// --- IndexedDB helpers (persist directory handle across sessions) ---
function idbOpen() {
  return new Promise((resolve, reject) => {
    const r = indexedDB.open(IDB_NAME, 1);
    r.onupgradeneeded = () => r.result.createObjectStore(IDB_STORE);
    r.onsuccess = () => resolve(r.result);
    r.onerror = () => reject(r.error);
  });
}

async function idbGet(key) {
  const db = await idbOpen();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(IDB_STORE, 'readonly');
    const req = tx.objectStore(IDB_STORE).get(key);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function idbSet(key, val) {
  const db = await idbOpen();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(IDB_STORE, 'readwrite');
    tx.objectStore(IDB_STORE).put(val, key);
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}

// --- File handle management ---
let dirHandle = null;

async function getStoredHandle(key) {
  try {
    return await idbGet(key);
  } catch {
    return null;
  }
}

async function ensureHandlePermission(handle) {
  if (!handle) return null;
  try {
    if ((await handle.queryPermission({ mode: 'readwrite' })) === 'granted') return handle;
    if ((await handle.requestPermission({ mode: 'readwrite' })) === 'granted') return handle;
    return null;
  } catch {
    return null;
  }
}

async function hasHandlePermission(handle) {
  if (!handle) return false;
  try {
    return (await handle.queryPermission({ mode: 'readwrite' })) === 'granted';
  } catch {
    return false;
  }
}

async function getSavedHandle(key) {
  return ensureHandlePermission(await getStoredHandle(key));
}

async function getStoredDirHandle() {
  return getStoredHandle(IDB_KEY);
}

async function getSavedDirHandle() {
  return getSavedHandle(IDB_KEY);
}

async function pickDirectory(key, pickerId) {
  const h = await window.showDirectoryPicker({ id: pickerId, startIn: 'documents', mode: 'readwrite' });
  await idbSet(key, h);
  return h;
}

async function pickDataDirectory() {
  return pickDirectory(IDB_KEY, 'tktool-data');
}

async function ensureDirHandle() {
  if (dirHandle) return dirHandle;
  dirHandle = await getSavedDirHandle();
  if (!dirHandle) dirHandle = await pickDataDirectory();
  return dirHandle;
}

async function readDataFile() {
  const dir = await ensureDirHandle();
  try {
    const fh = await dir.getFileHandle(DATA_FILENAME);
    const file = await fh.getFile();
    const text = await file.text();
    const d = JSON.parse(text);
    return normalizeData(d);
  } catch (error) {
    if (error?.name === 'NotFoundError') return defaultData();
    throw error;
  }
}

// --- Concurrency-safe persistence ---------------------------------
// Every record carries per-field version stamps in `_syncFields`
// ({ rev, changedAt, changeId } per field name). Merging is field-wise
// last-writer-wins on a Lamport counter, so concurrent edits to different
// fields of the same record both survive. Deletion is a versioned
// `deleted` flag on the record (soft delete) and merges like any other
// field edit; the UI never sees soft-deleted records.
const COLLECTION_KEYS = Object.keys(defaultData());
const RECORD_SYNC_FIELDS = new Set(['_syncFields']);
let deviceChangeSequence = 0;
const fallbackDeviceId = `device-${Date.now()}-${Math.random().toString(36).slice(2)}`;
// Clone of the UI-visible data at the last sync point; diff basis for saveData.
let localSnapshot = null;
// Soft-deleted records, kept out of the UI's `data`.
let deletedRecords = defaultData();
let pendingWrites = 0;
let saveGeneration = 0;
// Serializes writes within this instance so two saves never run
// createWritable() concurrently.
let writeChain = Promise.resolve();
// syncChannel notifies other instances in the same browser to reload.
let syncChannel = null;
try {
  syncChannel = new BroadcastChannel('tktool-sync');
  syncChannel.onmessage = async e => {
    if (!e.data || e.data.t !== 'saved') return;
    // Don't yank the view out from under someone who is typing — the
    // merge-on-write guard protects the data either way. Reload on the
    // next save/render cycle instead.
    if (pendingWrites) return;
    const el = document.activeElement;
    if (el && (el.isContentEditable || /^(INPUT|TEXTAREA|SELECT)$/.test(el.tagName))) return;
    try {
      await loadData();
      if (typeof render === 'function') render();
    } catch (error) {
      console.error('Reload after external save failed:', error);
      reportUiError('Synchronisierung fehlgeschlagen', error);
    }
  };
} catch {
  syncChannel = null;
}

function cloneData(value) {
  if (typeof structuredClone === 'function') return structuredClone(value);
  return JSON.parse(JSON.stringify(value));
}

function normalizeRecord(raw) {
  const record = { ...(raw || {}) };
  if (record._syncFields && typeof record._syncFields === 'object') {
    record._syncFields = { ...record._syncFields };
  } else {
    delete record._syncFields;
  }
  return record;
}

function normalizeData(raw) {
  const source = raw && typeof raw === 'object' ? raw : {};
  const merged = { ...defaultData(), ...source };
  for (const key of COLLECTION_KEYS) {
    merged[key] = (Array.isArray(merged[key]) ? merged[key] : []).map(normalizeRecord);
  }
  merged.persons = merged.persons.map(p => ({ ...p, supportMonate: p.supportMonate || [] }));
  merged.meetings = merged.meetings.map(meeting => ({
    ...meeting,
    participants: Array.isArray(meeting.participants) ? meeting.participants.filter(Boolean) : [],
  }));
  merged.monthReviews = merged.monthReviews.map(review => ({
    ...review,
    id: review.id || uid(),
    month: review.month,
    summary: review.summary || '',
    createdAt: review.createdAt || todayStr(),
    updatedAt: review.updatedAt || review.createdAt || todayStr(),
  }));
  merged.blocks = merged.blocks.map(({ status, ...block }) => block);
  return stripDeletedRecords(merged);
}

function getDeviceId() {
  try {
    let id = localStorage.getItem(DEVICE_ID_KEY);
    if (!id) {
      id = crypto.randomUUID ? crypto.randomUUID() : `${Date.now()}-${Math.random().toString(36).slice(2)}`;
      localStorage.setItem(DEVICE_ID_KEY, id);
    }
    return id;
  } catch {
    return fallbackDeviceId;
  }
}

function versionOf(value) {
  if (!value) return { rev: 0, changedAt: '', changeId: '' };
  return {
    rev: Number(value.rev) || 0,
    changedAt: value.changedAt || '',
    changeId: value.changeId || '',
  };
}

function compareVersions(a, b) {
  if (a.rev !== b.rev) return a.rev - b.rev;
  if (a.changedAt !== b.changedAt) return a.changedAt.localeCompare(b.changedAt);
  return a.changeId.localeCompare(b.changeId);
}

function nextVersion(previousVersion) {
  const rev = versionOf(previousVersion).rev + 1;
  const changedAt = new Date().toISOString();
  const changeId = `${getDeviceId()}:${Date.now()}:${++deviceChangeSequence}`;
  return { rev, changedAt, changeId };
}

function stableJson(value) {
  if (value === null || typeof value !== 'object') return JSON.stringify(value);
  if (Array.isArray(value)) return `[${value.map(stableJson).join(',')}]`;
  const entries = Object.keys(value).sort().map(key => `${JSON.stringify(key)}:${stableJson(value[key])}`);
  return `{${entries.join(',')}}`;
}

function contentFields(record) {
  return Object.keys(record || {}).filter(key => !RECORD_SYNC_FIELDS.has(key));
}

function fieldVersion(record, field) {
  return versionOf(record?._syncFields?.[field]);
}

function stampChangedFields(record, previousRecord) {
  const previousFields = previousRecord?._syncFields || {};
  const ownFields = record._syncFields || {};
  // Base: the newer stamp per field, so a stale caller state can never
  // roll a field's version backwards.
  record._syncFields = { ...previousFields };
  for (const [field, version] of Object.entries(ownFields)) {
    if (compareVersions(versionOf(version), versionOf(previousFields[field])) > 0) {
      record._syncFields[field] = version;
    }
  }
  const fields = new Set([...contentFields(record), ...contentFields(previousRecord)]);
  for (const field of fields) {
    if (previousRecord && stableJson(record[field]) === stableJson(previousRecord[field])) continue;
    record._syncFields[field] = nextVersion(record._syncFields[field]);
  }
}

// Diff the UI state against the last synced snapshot and produce the full
// store to persist: changed fields get fresh version stamps, records the
// user removed become soft-deleted, already-deleted records are carried over.
function prepareLocalChanges(nextData, previousData, deleted) {
  const next = normalizeData(nextData);
  // Before the first successful loadData there is no diff basis; diffing
  // against the data itself stamps nothing, and the write still merges.
  const previous = previousData ? normalizeData(previousData) : next;
  const store = defaultData();

  for (const key of COLLECTION_KEYS) {
    const previousById = new Map(previous[key].map(record => [record.id, record]));
    const deletedById = new Map((deleted?.[key] || []).map(record => [record.id, record]));
    const nextIds = new Set(next[key].map(record => record.id));

    for (const record of next[key]) {
      const grave = deletedById.get(record.id);
      // Re-added with the id of a soft-deleted record: resurrect explicitly
      // so the deletion gets outvoted.
      if (grave && !record.deleted) record.deleted = false;
      stampChangedFields(record, previousById.get(record.id) ?? grave);
      store[key].push(record);
    }

    for (const previousRecord of previous[key]) {
      if (nextIds.has(previousRecord.id)) continue;
      // Keep only the marker and the version stamps — the content of a
      // deleted record is never shown again, and a re-add brings its own.
      const grave = {
        id: previousRecord.id,
        deleted: true,
        _syncFields: { ...(previousRecord._syncFields || {}) },
      };
      grave._syncFields.deleted = nextVersion(grave._syncFields.deleted);
      store[key].push(grave);
    }

    for (const grave of deletedById.values()) {
      if (!nextIds.has(grave.id)) store[key].push(grave);
    }
  }
  return stripDeletedRecords(store);
}

function mergeRecords(mine, theirs) {
  if (!mine) return theirs;
  if (!theirs) return mine;
  const merged = {};
  const fields = new Set([...contentFields(mine), ...contentFields(theirs)]);
  const syncFields = {};

  for (const field of fields) {
    // The disk value wins a legacy tie. Once a field has metadata, only an
    // actual edit to that field can replace it.
    if (compareVersions(fieldVersion(mine, field), fieldVersion(theirs, field)) > 0) {
      if (Object.hasOwn(mine, field)) merged[field] = mine[field];
      if (mine._syncFields?.[field]) syncFields[field] = mine._syncFields[field];
    } else {
      if (Object.hasOwn(theirs, field)) merged[field] = theirs[field];
      if (theirs._syncFields?.[field]) syncFields[field] = theirs._syncFields[field];
    }
  }

  if (Object.keys(syncFields).length) merged._syncFields = syncFields;
  return merged;
}

function mergeData(mine, theirs) {
  const ours = normalizeData(mine);
  const disk = normalizeData(theirs);
  const out = defaultData();
  for (const key of COLLECTION_KEYS) {
    const mineById = new Map(ours[key].map(record => [record.id, record]));
    const theirById = new Map(disk[key].map(record => [record.id, record]));
    const ids = new Set([...mineById.keys(), ...theirById.keys()]);
    out[key] = [...ids].map(id => mergeRecords(mineById.get(id), theirById.get(id)));
  }
  return stripDeletedRecords(out);
}

// Reduce every soft-deleted record to its bare marker so old content never
// lingers in the file or cache — a stale full copy on another device would
// otherwise re-fill the fields on the next merge (versions tie, disk wins).
// The field stamps are kept: they are small, and a later re-add (e.g. a
// backup restore) needs them to outversion stale copies of the old content.
function stripDeletedRecords(store) {
  for (const key of COLLECTION_KEYS) {
    store[key] = store[key].map(record => (
      record.deleted
        ? { id: record.id, deleted: true, _syncFields: { ...(record._syncFields || {}) } }
        : record
    ));
  }
  return store;
}

function dataJson(value) {
  return stableJson(value);
}

async function cacheData(dataToCache) {
  try {
    await idbSet(IDB_DATA_CACHE_KEY, {
      dirHandle: dirHandle || await ensureDirHandle(),
      data: cloneData(dataToCache),
    });
  } catch (error) {
    console.error('Local recovery cache failed:', error);
    reportUiError('Lokale Sicherung fehlgeschlagen', error);
  }
}

async function getCachedData() {
  try {
    const cached = await idbGet(IDB_DATA_CACHE_KEY);
    if (!cached) return null;
    if (cached.data) {
      if (cached.dirHandle && dirHandle && typeof cached.dirHandle.isSameEntry === 'function') {
        if (!(await cached.dirHandle.isSameEntry(dirHandle))) return null;
      }
      return normalizeData(cached.data);
    }
    // Compatibility with the short-lived unscoped cache format.
    return normalizeData(cached);
  } catch (error) {
    console.error('Reading local recovery cache failed:', error);
    reportUiError('Lokale Sicherung konnte nicht gelesen werden', error);
    return null;
  }
}

async function writeDataFileNow(snapshot) {
  const dir = await ensureDirHandle();
  // Cache before touching the cloud-backed file. If the file write fails or
  // OneDrive later replaces it with an older version, this device can recover
  // its newer records on the next load.
  await cacheData(snapshot);
  const disk = await readDataFile();
  const payload = mergeData(snapshot, disk);
  const mergedExternal = dataJson(payload) !== dataJson(snapshot);
  const fh = await dir.getFileHandle(DATA_FILENAME, { create: true });
  const writable = await fh.createWritable();
  try {
    await writable.write(JSON.stringify(payload, null, 2));
    await writable.close();
  } catch (error) {
    try { await writable.abort(); } catch {}
    throw error;
  }
  await cacheData(payload);
  if (syncChannel) { try { syncChannel.postMessage({ t: 'saved' }); } catch {} }
  return { payload, mergedExternal };
}

function writeDataFile(snapshot) {
  // Serialize writes; run regardless of whether the previous one failed.
  writeChain = writeChain.then(
    () => writeDataFileNow(snapshot),
    () => writeDataFileNow(snapshot),
  );
  return writeChain;
}

// --- Public API (same interface as before) ---
let data = defaultData();

// The UI only ever sees live records; soft-deleted ones stay in the
// persistence layer. They are never removed automatically: a device that
// was offline for a long time could otherwise re-introduce the record from
// its stale copy once the marker is gone.
function adoptStore(store) {
  const live = defaultData();
  const deleted = defaultData();
  for (const key of COLLECTION_KEYS) {
    for (const record of store[key]) (record.deleted ? deleted : live)[key].push(record);
  }
  data = live;
  deletedRecords = deleted;
  localSnapshot = cloneData(live);
}

async function loadData() {
  const disk = await readDataFile();
  const cached = await getCachedData();
  const store = cached ? mergeData(cached, disk) : disk;
  adoptStore(store);

  if (cached && dataJson(store) !== dataJson(disk)) {
    try {
      const result = await writeDataFile(cloneData(store));
      adoptStore(result.payload);
      uiToast('Lokale Änderungen wiederhergestellt und synchronisiert', 5000);
    } catch (error) {
      console.error('Writing recovered data failed:', error);
      reportUiError('Lokale Änderungen wiederhergestellt, aber Dateisynchronisierung fehlgeschlagen', error);
    }
  } else {
    await cacheData(store);
  }
  return data;
}

function saveData(d) {
  const store = prepareLocalChanges(d, localSnapshot, deletedRecords);
  adoptStore(store);
  const snapshot = cloneData(store);
  const generation = ++saveGeneration;
  pendingWrites++;
  const operation = writeDataFile(snapshot);
  return operation.then(result => {
    pendingWrites--;
    if (generation === saveGeneration) {
      adoptStore(result.payload);
      if (result.mergedExternal && typeof render === 'function') {
        try { render(); } catch (error) { reportUiError('Darstellung fehlgeschlagen', error); }
      }
    }
    if (result.mergedExternal) uiToast('Externe Änderung erkannt – zusammengeführt', 4000);
    return result.payload;
  }, err => {
    pendingWrites--;
    console.error('Save failed:', err);
    reportUiError('Speichern fehlgeschlagen – Änderung NICHT in die Datei geschrieben', err);
    return null;
  });
}

</script>
<script data-source="./js/helpers.js">
// ============================================================
// HELPERS — dates, formatting, lookups
// ============================================================
function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
}

function currentMonth() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
}

function formatMonth(m) {
  const [y, mo] = m.split('-');
  const months = ['Jänner','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
  return months[parseInt(mo) - 1] + ' ' + y;
}

function formatDate(d) {
  if (!d) return '';
  const dt = new Date(d);
  return dt.toLocaleDateString('de-AT', { day: '2-digit', month: '2-digit', year: 'numeric' });
}

function formatDateShort(d) {
  if (!d) return '';
  const dt = new Date(d);
  return dt.toLocaleDateString('de-AT', { day: '2-digit', month: '2-digit' });
}

function formatWeekdayShort(d) {
  if (!d) return '';
  return new Date(d).toLocaleDateString('de-AT', { weekday: 'short' }).replace('.', '');
}

function getJiraBaseUrl() {
  try { return localStorage.getItem(JIRA_BASE_KEY) || ''; } catch { return ''; }
}

function jiraUrl(ref) {
  const base = getJiraBaseUrl().replace(/\/+$/, '');
  if (!base || !ref) return null;
  return (/\/browse$/.test(base) ? base : base + '/browse') + '/' + encodeURIComponent(ref);
}

function jiraMd(ref) {
  const url = jiraUrl(ref);
  return url ? `[${ref}](${url})` : ref;
}

function comparePersonsByName(a, b) {
  return (a?.name || '').localeCompare(b?.name || '', 'de-AT', { sensitivity: 'base' });
}

function formatMonthShort(d) {
  if (!d) return '';
  const dt = new Date(d);
  const m = String(dt.getMonth() + 1).padStart(2, '0');
  const y = String(dt.getFullYear()).slice(-2);
  return `${m}/${y}`;
}

function todayStr() {
  return new Date().toISOString().slice(0, 10);
}

function dateShift(baseISO, days) {
  const d = new Date(baseISO + 'T00:00:00Z');
  d.setUTCDate(d.getUTCDate() + days);
  return d.toISOString().slice(0, 10);
}

function compareByDueDate(a, b) {
  if (a.date && b.date) return a.date.localeCompare(b.date);
  if (a.date) return -1;
  if (b.date) return 1;
  return 0;
}

function compareUpcomingMeetingDate(a, b) {
  if (a.date && b.date) return a.date.localeCompare(b.date);
  if (!a.date && !b.date) return meetingTitleText(a).localeCompare(meetingTitleText(b), 'de-AT');
  return a.date ? 1 : -1;
}

function personName(id) {
  const p = data.persons.find(p => p.id === id);
  return p ? p.name : '';
}

function personById(id) {
  return data.persons.find(person => person.id === id) || null;
}

function isTeamMemberId(personId) {
  const person = personById(personId);
  return !!person && person.type !== 'kontakt';
}

function isGrowthType(type) {
  return type === 'highlight' || type === 'concern';
}

function isGrowthEntry(item) {
  return !!item && isGrowthType(item.type) && isTeamMemberId(item.personId);
}

function isPersonalWin(item) {
  return !!item && item.type === 'win';
}

function itemTypeLabel(type) {
  return ({
    todo: 'todo',
    win: 'win',
    highlight: 'highlight',
    concern: 'concern',
    backlog: 'backlog',
    waiting: 'warte auf...',
    done: 'done',
  })[type] || type;
}

function normalizeItemMonth(item) {
  if (!item) return item;
  if (item.date) item.month = item.date.slice(0, 7);
  return item;
}

function compareItemsByDateDesc(a, b) {
  return (b.date || '').localeCompare(a.date || '');
}

function monthProgress(month) {
  const start = monthStart(month);
  const end = monthEnd(month);
  const today = parseISO(todayStr());
  const clamped = today < start ? start : today > end ? end : today;
  const totalDays = daysBetween(toISO(start), toISO(end)) + 1;
  const elapsedDays = daysBetween(toISO(start), toISO(clamped)) + 1;
  return {
    totalDays,
    elapsedDays,
    percent: Math.max(0, Math.min(100, Math.round((elapsedDays / totalDays) * 100))),
  };
}

function monthItems(items, month) {
  return items.filter(item => item.month === month);
}

function monthReview(month) {
  return (data.monthReviews || []).find(review => review.month === month) || null;
}

function upsertMonthReview(month, summary) {
  if (!data.monthReviews) data.monthReviews = [];
  const existing = monthReview(month);
  const trimmed = summary.trim();
  if (!trimmed) {
    if (existing) data.monthReviews = data.monthReviews.filter(review => review.month !== month);
    return;
  }
  if (existing) {
    existing.summary = trimmed;
    existing.updatedAt = todayStr();
    return;
  }
  data.monthReviews.push({
    id: uid(),
    month,
    summary: trimmed,
    createdAt: todayStr(),
    updatedAt: todayStr(),
  });
}

function currentMonthTeamGrowthSummary(month) {
  const growth = monthItems(data.items.filter(isGrowthEntry), month);
  const byPerson = {};
  growth.forEach(item => {
    if (!item.personId) return;
    if (!byPerson[item.personId]) byPerson[item.personId] = { highlights: 0, concerns: 0 };
    if (item.type === 'highlight') byPerson[item.personId].highlights += 1;
    if (item.type === 'concern') byPerson[item.personId].concerns += 1;
  });
  return Object.entries(byPerson)
    .map(([personId, counts]) => ({ personId, ...counts }))
    .sort((a, b) => {
      const deltaA = a.highlights - a.concerns;
      const deltaB = b.highlights - b.concerns;
      if (deltaB !== deltaA) return deltaB - deltaA;
      return personName(a.personId).localeCompare(personName(b.personId), 'de-AT');
    });
}

function renderMonthReflectionCard(month, options = {}) {
  const { empty = false } = options;
  const review = monthReview(month);
  if (!review && !empty) return '';
  return `
    <div class="month-reflection-card card ${review ? 'has-review' : 'is-empty'}">
      <div class="month-reflection-header">
        <div>
          <div class="month-reflection-kicker">${formatMonth(month)} · meine monatsspur</div>
          <div class="month-reflection-title">Wie der Monat für mich war</div>
        </div>
        ${review ? '<span class="badge badge-focus">Monatsrückblick</span>' : ''}
      </div>
      <div class="month-reflection-body">
        ${review
          ? `<div class="month-reflection-text">${esc(review.summary).replace(/\n/g, '<br>')}</div>`
          : '<div class="month-reflection-empty">Dein Rückblick erscheint hier, sobald du den Monat abschliesst.</div>'}
      </div>
    </div>
  `;
}

function personGrowthSignal(personId, days = 30) {
  const start = dateShift(todayStr(), -(days - 1));
  const items = data.items
    .filter(item => item.personId === personId && isGrowthEntry(item) && item.date && item.date >= start)
    .sort(compareItemsByDateDesc);
  return {
    items,
    highlights: items.filter(item => item.type === 'highlight').length,
    concerns: items.filter(item => item.type === 'concern').length,
  };
}

function personInitials(person) {
  const parts = String(person?.name || '').trim().split(/\s+/).filter(Boolean);
  if (!parts.length) return '?';
  return parts.slice(0, 2).map(part => part.charAt(0).toUpperCase()).join('');
}

function personAccentColor(person) {
  const palette = ['var(--blue)', 'var(--accent)', 'var(--success)', 'var(--warning)', 'var(--purple)', 'var(--danger)'];
  const source = String(person?.id || person?.name || 'x');
  let hash = 0;
  for (let i = 0; i < source.length; i += 1) hash = ((hash << 5) - hash) + source.charCodeAt(i);
  return palette[Math.abs(hash) % palette.length];
}

function personAvatar(person, size = 'md', options = {}) {
  if (!person) return '';
  const { absent = false } = options;
  return `
    <span class="person-avatar-badge person-avatar-${size} ${absent ? 'is-absent' : ''}" style="--person-accent:${personAccentColor(person)}" aria-hidden="true">
      ${esc(personInitials(person))}
    </span>
  `;
}

function meetingParticipantIds(meeting) {
  if (!meeting) return [];
  const ids = [];
  if (meeting.personId) ids.push(meeting.personId);
  if (Array.isArray(meeting.participants)) ids.push(...meeting.participants);
  return [...new Set(ids.filter(Boolean))];
}

function isTeamMeeting(meeting) {
  if (!meeting || meeting.type === 'oneOnOne') return false;
  return meeting.isTeamMeeting === true;
}

function meetingParticipants(meeting) {
  return meetingParticipantIds(meeting)
    .map(id => data.persons.find(person => person.id === id))
    .filter(Boolean)
    .sort(comparePersonsByName);
}

function renderParticipantStack(meeting, limit = 4) {
  const participants = meetingParticipants(meeting);
  if (!participants.length) return '';
  const visible = participants.slice(0, limit).map(person => `
    <button class="participant-stack-avatar" onclick="event.stopPropagation();openPersonById('${person.id}')" title="${esc(person.name)}">
      ${personAvatar(person, 'sm')}
    </button>
  `).join('');
  const extra = participants.length > limit ? `<span class="participant-stack-more">+${participants.length - limit}</span>` : '';
  return `<div class="participant-stack">${visible}${extra}</div>`;
}

function personRoute(id) {
  const p = data.persons.find(person => person.id === id);
  if (!p) return null;
  return p.type === 'kontakt' ? 'kontakte:detail' : 'team:detail';
}

function openPersonById(id) {
  const route = personRoute(id);
  if (!route) return;
  navigate(route, { personId: id });
}

function openPersonTodos(personId) {
  const person = personById(personId);
  navigate('overview', {
    month: currentMonth(),
    overviewLayout: 'list',
    overviewQuery: person?.name || personName(personId),
  });
}

function meetingTitleText(meeting) {
  if (!meeting) return '';
  if (meeting.type === 'oneOnOne') return '1:1' + (meeting.personId ? ' mit ' + personName(meeting.personId) : '');
  return meeting.title || 'Meeting';
}

function meetingOptions(selectedId, options = {}) {
  const { includeEmpty = true, personId = null } = options;
  const meetings = data.meetings
    .filter(m => !personId || !m.personId || m.personId === personId)
    .slice()
    .sort((a, b) => (b.date || '').localeCompare(a.date || ''));
  let html = includeEmpty ? '<option value="">—</option>' : '';
  html += meetings.map(m => `
    <option value="${m.id}" ${selectedId === m.id ? 'selected' : ''}>${esc(meetingTitleText(m))}${m.date ? ' · ' + formatDate(m.date) : ''}</option>
  `).join('');
  return html;
}

function meetingItems(id) {
  return data.items
    .filter(item => item.meetingId === id)
    .sort((a, b) => compareByDueDate(a, b));
}

function previousOneOnOneMeeting(meeting) {
  if (!meeting || meeting.type !== 'oneOnOne' || !meeting.personId) return null;
  const referenceDate = meeting.date || todayStr();
  return data.meetings
    .filter(item =>
      item.type === 'oneOnOne' &&
      item.personId === meeting.personId &&
      item.id !== meeting.id &&
      item.date &&
      item.date < referenceDate
    )
    .sort((a, b) => b.date.localeCompare(a.date))[0] || null;
}

function oneOnOneCarryover(meeting) {
  if (!meeting || meeting.type !== 'oneOnOne' || !meeting.personId) {
    return { openFollowUps: [], openTodos: [], recentSignals: [] };
  }
  const referenceDate = meeting.date || todayStr();
  const previousMeeting = previousOneOnOneMeeting(meeting);
  const personItems = data.items.filter(item => item.personId === meeting.personId);
  const openItems = personItems.filter(item => item.status !== 'done' && item.id && item.meetingId !== meeting.id);
  const openFollowUps = openItems
    .filter(item => item.meetingId)
    .sort(compareByDueDate);
  const openTodos = openItems
    .filter(item => !item.meetingId && item.type === 'todo')
    .sort(compareByDueDate);
  const recentSignals = personItems
    .filter(item =>
      isGrowthType(item.type) &&
      item.date &&
      item.date <= referenceDate &&
      (!previousMeeting || item.date > previousMeeting.date)
    )
    .sort(compareItemsByDateDesc)
    .slice(0, 6);
  return { openFollowUps, openTodos, recentSignals };
}

function carryoverCount(carryover) {
  return carryover.openFollowUps.length + carryover.openTodos.length + carryover.recentSignals.length;
}

function personActivitySummary(personId) {
  const month = currentMonth();
  const itemDates = data.items
    .filter(item => item.personId === personId && item.date)
    .map(item => item.date);
  const meetingDates = data.meetings
    .filter(meeting => meetingParticipantIds(meeting).includes(personId) && meeting.date)
    .map(meeting => meeting.date);
  const latestDate = itemDates.concat(meetingDates).sort((a, b) => b.localeCompare(a))[0] || '';
  const monthItems = data.items.filter(item => item.personId === personId && item.month === month);
  const monthMeetings = data.meetings.filter(meeting =>
    meetingParticipantIds(meeting).includes(personId) &&
    meeting.date &&
    meeting.date.slice(0, 7) === month
  );
  const monthSignals = monthItems.filter(isGrowthEntry);
  const parts = [
    monthItems.length ? `${monthItems.length} Items` : '',
    monthMeetings.length ? `${monthMeetings.length} Termine` : '',
    monthSignals.length ? `${monthSignals.length} Signale` : '',
  ].filter(Boolean);
  return {
    latestDate,
    label: latestDate ? formatDateShort(latestDate) : 'keine Aktivität',
    note: parts.length ? parts.join(' · ') : 'aktueller Monat leer',
  };
}

function includesQuery(value, query) {
  return String(value || '').toLocaleLowerCase('de-AT').includes(query);
}

function itemMatchesQuery(item, query) {
  const linkedMeeting = item.meetingId ? data.meetings.find(m => m.id === item.meetingId) : null;
  return [
    item.text,
    item.notes,
    item.type,
    item.status,
    item.date,
    item.month,
    personName(item.personId),
    meetingTitleText(linkedMeeting),
  ].some(value => includesQuery(value, query));
}

function personMatchesQuery(person, query) {
  return [
    person.name,
    person.pushDirection,
    person.type === 'kontakt' ? '' : person.notes,
    person.jiraUrl,
    person.gitlabMrUrl,
  ].some(value => includesQuery(value, query));
}

function meetingMatchesQuery(meeting, query) {
  const linkedItems = data.items.filter(item => item.meetingId === meeting.id);
  return [
    meeting.title,
    meeting.prep,
    meeting.notes,
    meeting.date,
    personName(meeting.personId),
    ...meetingParticipants(meeting).map(person => person.name),
    ...linkedItems.flatMap(item => [item.text, item.notes, item.status, item.type]),
    meeting.type === 'oneOnOne' ? '1:1' : 'meeting',
    isTeamMeeting(meeting) ? 'team' : 'other',
  ].some(value => includesQuery(value, query));
}

function focusMatchesQuery(focus, query) {
  return [focus.title, focus.description, focus.month].some(value => includesQuery(value, query));
}

function prevMonth(m) {
  const [y, mo] = m.split('-').map(Number);
  if (mo === 1) return (y - 1) + '-12';
  return y + '-' + String(mo - 1).padStart(2, '0');
}

function nextMonth(m) {
  const [y, mo] = m.split('-').map(Number);
  if (mo === 12) return (y + 1) + '-01';
  return y + '-' + String(mo + 1).padStart(2, '0');
}



</script>
<script data-source="./js/nav.js">
// ============================================================
// ROUTER
// ============================================================
let currentView = 'reviews';
let viewState = {};
let pendingOverviewSearchSelection = null;
let pendingMeetingSearchSelection = null;
let sudoMode = false;

function isSudoMode() {
  return sudoMode;
}

function toggleSudoMode() {
  sudoMode = !sudoMode;
  toast(`sudo ${sudoMode ? 'on' : 'off'}`);
  render();
}

function sudoLockedPlaceholder(label = 'Interner Bereich') {
  return `
    <div class="sudo-locked-placeholder" aria-label="${esc(label)} gesperrt">
      <div class="sudo-locked-scrim" aria-hidden="true">
        <span></span><span></span><span></span>
      </div>
      <div class="sudo-locked-message">
        <strong>${esc(label)}</strong>
        <span>Sudo Mode mit Cmd/Ctrl+Shift+S aktivieren</span>
      </div>
    </div>
  `;
}

function navigate(view, state = {}) {
  const previousView = currentView;
  const preserveMeetingState = previousView.startsWith('meetings') && view.startsWith('meetings');
  currentView = view;
  viewState = preserveMeetingState
    ? {
        meetingQuery: viewState.meetingQuery,
        meetingFilter: viewState.meetingFilter,
        meetingRange: viewState.meetingRange,
        ...state,
      }
    : state;
  render();
  document.querySelectorAll('#nav button').forEach(b => {
    b.classList.toggle('active', b.dataset.view === view.split(':')[0]);
  });
}

document.getElementById('nav').addEventListener('click', e => {
  if (e.target.tagName === 'BUTTON') navigate(e.target.dataset.view);
});

// ============================================================
// RENDER
// ============================================================
function render() {
  const app = document.getElementById('app');
  app.dataset.view = currentView.split(':')[0];
  syncGlobalSearchInput();
  switch (currentView) {
    case 'overview': app.innerHTML = renderOverview(); break;
    case 'team': app.innerHTML = renderTeam(); break;
    case 'team:detail': app.innerHTML = renderTeam(); break;
    case 'kontakte': app.innerHTML = renderKontakte(); break;
    case 'kontakte:detail': app.innerHTML = renderKontaktDetail(); break;
    case 'meetings': app.innerHTML = renderMeetings(); setTimeout(initPrepBulletsAutoResize, 0); break;
    case 'meetings:detail': app.innerHTML = renderMeetings(); setTimeout(initPrepBulletsAutoResize, 0); break;
    case 'reviews': app.innerHTML = renderReviews(); break;
    case 'planung': app.innerHTML = renderPlanung(); break;
    case 'search': app.innerHTML = renderSearch(); break;
    default: app.innerHTML = renderOverview();
  }
  restoreOverviewSearchFocus();
  restoreMeetingSearchFocus();
}


</script>
<script data-source="./js/todo.js">
// ============================================================
// OVERVIEW
// ============================================================
function renderOverview() {
  const month = viewState.month || currentMonth();
  const query = (viewState.overviewQuery || '').trim().toLocaleLowerCase('de-AT');
  const layout = overviewLayout();
  const review = monthReview(month);
  const pastOpenWarning = renderPastOpenItemsWarning();
  const items = data.items
    .filter(i => !isGrowthEntry(i))
    .filter(i => i.month === month)
    .filter(i => !query || itemMatchesQuery(i, query));

  const todos = items.filter(i => i.status === 'todo').sort(compareByDueDate);
  const backlog = items.filter(i => i.status === 'backlog').sort(compareByDueDate);
  const waiting = items
    .filter(i => i.status === 'waiting')
    .sort(compareByDueDate);
  const done = items.filter(i => i.status === 'done');

  return `
    <div class="section-header">
      <div class="overview-toolbar">
        <div class="overview-toolbar-main">
          <div class="overview-toolbar-start">
            <div class="month-selector">
              <button onclick="changeMonth(-1)">&#8592;</button>
              <span class="month-label">${formatMonth(month)}</span>
              <button onclick="changeMonth(1)">&#8594;</button>
            </div>
          </div>
          <div class="view-search overview-search-row">
            <input
              id="overviewSearchInput"
              type="search"
              placeholder="monat filtern..."
              value="${esc(viewState.overviewQuery || '')}"
              oninput="setOverviewQuery(this.value)"
            >
            <button
              class="btn btn-primary btn-sm overview-add-todo-btn"
              type="button"
              onclick="openCapture({ type: 'todo', status: 'todo', month: '${month}' })"
              title="Todo hinzufügen"
              aria-label="Todo hinzufügen"
            >+</button>
            ${query ? `<button class="btn btn-secondary btn-sm" onclick="clearOverviewQuery()">Reset</button>` : ''}
          </div>
          <div class="view-toggle overview-search-toggle" role="tablist" aria-label="Todo Ansicht">
            <button class="view-toggle-btn ${layout === 'board' ? 'active' : ''}" onclick="setOverviewLayout('board')" role="tab" aria-selected="${layout === 'board'}">board</button>
            <button class="view-toggle-btn ${layout === 'list' ? 'active' : ''}" onclick="setOverviewLayout('list')" role="tab" aria-selected="${layout === 'list'}">list</button>
          </div>
          <details class="overview-actions-menu">
            <summary>monat</summary>
            <div class="overview-actions-menu-panel">
              <button class="btn btn-secondary btn-sm" onclick="openMonthCarryover('${month}')">monat abschliessen</button>
              <button class="btn btn-secondary btn-sm" onclick="exportMonth('${month}')">export .md</button>
            </div>
          </details>
        </div>
        ${review ? `<div class="overview-toolbar-secondary">${renderMonthReflectionCard(month)}</div>` : ''}
        ${pastOpenWarning}
      </div>
    </div>

    ${layout === 'list'
      ? renderTaskTable(items)
      : `
        <div class="overview-board">
          ${renderItemSection('backlog', backlog, 'backlog')}
          ${renderItemSection('todo', todos, 'todo')}
          ${renderItemSection('warte auf...', waiting, 'waiting')}
          ${renderItemSection('erledigt', done, 'done')}
        </div>
      `}
  `;
}

function pastOpenItemsByMonth() {
  const current = currentMonth();
  return data.items
    .filter(item => !isGrowthEntry(item))
    .filter(item => item.status !== 'done')
    .filter(item => item.month && item.month < current)
    .reduce((groups, item) => {
      groups[item.month] = groups[item.month] || [];
      groups[item.month].push(item);
      return groups;
    }, {});
}

function renderPastOpenItemsWarning() {
  const groups = pastOpenItemsByMonth();
  const months = Object.keys(groups).sort();
  if (!months.length) return '';
  const count = months.reduce((sum, month) => sum + groups[month].length, 0);
  const oldest = months[0];
  const newest = months[months.length - 1];
  const rangeLabel = oldest === newest ? formatMonth(oldest) : `${formatMonth(oldest)} - ${formatMonth(newest)}`;
  return `
    <button class="overview-lost-items-warning" type="button" onclick="navigate('overview', {month:'${oldest}', overviewLayout:'list'})">
      <span class="overview-lost-items-mark">!</span>
      <span>${count} offene Item${count === 1 ? '' : 's'} in Vormonat${months.length === 1 ? '' : 'en'}</span>
      <span class="overview-lost-items-month">${esc(rangeLabel)}</span>
    </button>
  `;
}

function renderMonthlyFocusPanel(month) {
  const focuses = data.focuses.filter(f => f.month === month);
  return `
    <div class="dashboard-focus card">
      <div class="dashboard-focus-head">
        <div>
          <div class="dashboard-focus-kicker">${formatMonth(month)}</div>
          <div class="dashboard-focus-title">Monthly Focus</div>
        </div>
        <button class="btn btn-sm btn-secondary" onclick="openFocusForm('${month}')">+ Focus</button>
      </div>
      <div class="dashboard-focus-list">
        ${focuses.length ? focuses.map(f => `
          <div class="dashboard-focus-item">
            <div class="dashboard-focus-copy">
              <div class="focus-title">${esc(f.title)}</div>
              ${f.description ? `<div class="focus-desc">${esc(f.description)}</div>` : ''}
            </div>
            <button class="overview-focus-delete" onclick="deleteFocus('${f.id}')" title="Löschen">&#x2715;</button>
          </div>
        `).join('') : '<div class="overview-focus-empty">Noch kein Focus gesetzt</div>'}
      </div>
    </div>
  `;
}

function renderTeamGrowthPersonChips(perPerson, emptyText, options = {}) {
  const extraClass = options.extraClass ? ` ${options.extraClass}` : '';
  const onClick = personId => options.closeOverlay
    ? `closeOverlay();navigate('team', {personId:'${personId}'})`
    : `navigate('team', {personId:'${personId}'})`;
  return `
    <div class="impact-person-strip${extraClass}">
      ${perPerson.length ? perPerson.map(entry => `
        <button class="impact-person-chip" onclick="${onClick(entry.personId)}">
          ${personAvatar(personById(entry.personId), 'sm')}
          <span class="impact-person-copy">
            <span class="impact-person-name">${esc(personName(entry.personId))}</span>
            <span class="impact-person-metrics">
              <span class="impact-metric-positive">+${entry.highlights}</span>
              <span class="impact-metric-sep">/</span>
              <span class="impact-metric-negative">-${entry.concerns}</span>
            </span>
          </span>
        </button>
      `).join('') : `<div class="team-empty-copy">${emptyText}</div>`}
    </div>
  `;
}

function renderMonthImpactPanel(month) {
  const progress = monthProgress(month);
  const personalWins = monthItems(data.items.filter(isPersonalWin), month).sort(compareItemsByDateDesc);
  const teamGrowth = monthItems(data.items.filter(isGrowthEntry), month).sort(compareItemsByDateDesc);
  const highlights = teamGrowth.filter(item => item.type === 'highlight');
  const concerns = teamGrowth.filter(item => item.type === 'concern');
  const perPerson = currentMonthTeamGrowthSummary(month);
  return `
    <div class="impact-month card">
      <div class="impact-month-header">
        <div>
          <div class="impact-month-kicker">${formatMonth(month)} · Tag ${progress.elapsedDays} von ${progress.totalDays}</div>
          <div class="impact-month-title">Was ich diesen Monat bewegt habe</div>
        </div>
        <div class="impact-month-summary">${personalWins.length} Wins · ${highlights.length} Highlights · ${concerns.length} Concerns</div>
      </div>
      <div class="impact-month-progress" aria-hidden="true">
        <div class="impact-month-progress-bar" style="width:${progress.percent}%"></div>
      </div>

      <div class="impact-month-grid">
        <div class="impact-month-column">
          <div class="impact-month-column-head">mein impact diesen monat</div>
          ${personalWins.length ? `
            <div class="impact-stream">
              ${personalWins.slice(0, 8).map(item => `
                <button class="impact-entry impact-entry-personal" onclick="openEditItem('${item.id}')">
                  <span class="impact-entry-date">${formatDateShort(item.date) || '&ndash;'}</span>
                  <span class="badge badge-win">${itemTypeLabel(item.type)}</span>
                  <span class="impact-entry-text">${esc(item.text)}</span>
                  <span class="impact-entry-pulse" aria-hidden="true"></span>
                </button>
              `).join('')}
            </div>
          ` : '<div class="team-empty-copy">Noch keine persönlichen Wins in diesem Monat</div>'}
        </div>
        <div class="impact-month-column">
          <div class="impact-month-column-head">teamentwicklung diesen monat</div>
          ${renderTeamGrowthPersonChips(perPerson, 'Noch kein Teamwachstum in diesem Monat erfasst', { extraClass: 'impact-person-strip-panel' })}
        </div>
      </div>
    </div>
  `;
}

function renderSearch() {
  const rawQuery = (viewState.query || '').trim();
  const query = rawQuery.toLocaleLowerCase('de-AT');

  if (!query) {
    return `
      <div class="section-header">
        <span class="section-title">Suche</span>
      </div>
      <div class="empty-state">
        <div class="empty-state-icon">&#128269;</div>
        <div class="empty-state-text">Oben im Header einen Suchbegriff eingeben</div>
      </div>
    `;
  }

  const itemResults = data.items
    .filter(item => itemMatchesQuery(item, query))
    .sort((a, b) => (b.date || '').localeCompare(a.date || ''));
  const personResults = data.persons
    .filter(person => personMatchesQuery(person, query))
    .sort((a, b) => a.name.localeCompare(b.name, 'de-AT'));
  const meetingResults = data.meetings
    .filter(meeting => meetingMatchesQuery(meeting, query))
    .sort((a, b) => (b.date || '').localeCompare(a.date || ''));
  const focusResults = data.focuses
    .filter(focus => focusMatchesQuery(focus, query))
    .sort((a, b) => (b.month || '').localeCompare(a.month || ''));

  const resultCount = itemResults.length + personResults.length + meetingResults.length + focusResults.length;

  return `
    <div class="section-header">
      <span class="section-title">Suche</span>
      <div class="search-summary">${resultCount} Treffer für "${esc(rawQuery)}"</div>
    </div>

    ${renderSearchSection('Items', itemResults, item => `
      <button class="search-result-card" onclick="openEditItem('${item.id}')">
        <div class="search-result-head">
          ${item.status === 'done' ? `<span class="badge badge-${item.type}">${itemTypeLabel(item.type)}</span>` : ''}
          <span class="search-result-date">${item.month ? formatMonth(item.month) : ''}</span>
        </div>
        <div class="search-result-title">${esc(item.text)}</div>
        ${item.notes ? `<div class="search-result-body">${esc(item.notes)}</div>` : ''}
        <div class="search-result-meta">${item.personId ? '@' + esc(personName(item.personId)) + ' · ' : ''}${item.status}${item.date ? ' · ' + formatDate(item.date) : ''}${item.meetingId ? ' · ' + esc(meetingTitleText(data.meetings.find(meeting => meeting.id === item.meetingId))) : ''}</div>
      </button>
    `)}

    ${renderSearchSection('Personen', personResults, person => `
      <button class="search-result-card" onclick="navigate('${person.type === 'kontakt' ? 'kontakte:detail' : 'team:detail'}', {personId:'${person.id}'})">
        <div class="search-result-head">
          <span class="badge ${person.type === 'kontakt' ? 'badge-note' : 'badge-focus'}">${person.type === 'kontakt' ? 'kontakt' : 'team'}</span>
        </div>
        <div class="search-result-title">${esc(person.name)}</div>
        ${person.pushDirection ? `<div class="search-result-body">${esc(person.pushDirection)}</div>` : ''}
      </button>
    `)}

    ${renderSearchSection('Meetings', meetingResults, meeting => `
      <button class="search-result-card" onclick="navigate('meetings:detail', {meetingId:'${meeting.id}'})">
        <div class="search-result-head">
          <span class="badge ${meeting.type === 'oneOnOne' ? 'badge-done' : 'badge-todo'}">${meeting.type === 'oneOnOne' ? '1:1' : (isTeamMeeting(meeting) ? 'team' : 'meeting')}</span>
          <span class="search-result-date">${meeting.date ? formatDate(meeting.date) : ''}</span>
        </div>
        <div class="search-result-title">${meetingDisplayTitle(meeting)}</div>
        ${meeting.prep ? `<div class="search-result-body">${esc(meeting.prep)}</div>` : meeting.notes ? `<div class="search-result-body">${esc(meeting.notes)}</div>` : ''}
      </button>
    `)}

    ${renderSearchSection('Focus', focusResults, focus => `
      <button class="search-result-card" onclick="navigate('overview', {month:'${focus.month}'})">
        <div class="search-result-head">
          <span class="badge badge-focus">focus</span>
          <span class="search-result-date">${formatMonth(focus.month)}</span>
        </div>
        <div class="search-result-title">${esc(focus.title)}</div>
        ${focus.description ? `<div class="search-result-body">${esc(focus.description)}</div>` : ''}
      </button>
    `)}

    ${resultCount === 0 ? `
      <div class="empty-state">
        <div class="empty-state-icon">&#128270;</div>
        <div class="empty-state-text">Keine Treffer gefunden</div>
      </div>
    ` : ''}
  `;
}

function renderSearchSection(title, entries, renderer) {
  if (!entries.length) return '';
  return `
    <div class="card">
      <div class="card-header">
        <span class="card-title">${title} (${entries.length})</span>
      </div>
      <div class="search-results-grid">
        ${entries.map(renderer).join('')}
      </div>
    </div>
  `;
}

function renderItemSection(title, items, status) {
  return `
    <div class="card drop-target board-${status}"
      ondragover="onItemDragOver(event)"
      ondragleave="onItemDragLeave(event)"
      ondrop="onItemDrop(event, '${status}')">
      <div class="card-header">
        <span class="card-title">${title} (${items.length})</span>
      </div>
      ${items.length ? `
        <ul class="item-list">
          ${items.map(i => renderItem(i, true)).join('')}
        </ul>
      ` : `<div style="color:var(--text-muted);font-size:14px">Keine Einträge</div>`}
    </div>
  `;
}

function compareOverviewTaskRows(a, b) {
  const statusOrder = { todo: 0, waiting: 1, backlog: 2, done: 3 };
  const statusDiff = (statusOrder[a.status] ?? 99) - (statusOrder[b.status] ?? 99);
  if (statusDiff !== 0) return statusDiff;
  const dueDiff = compareByDueDate(a, b);
  if (dueDiff !== 0) return dueDiff;
  return (a.text || '').localeCompare(b.text || '', 'de-AT');
}

function renderTaskSections(sections) {
  return `
    <div class="task-sections">
      ${sections.map(([title, items, status]) => renderTaskSection(title, items, status)).join('')}
    </div>
  `;
}

function renderTaskTable(items) {
  const sortedItems = items.slice().sort(compareOverviewTaskRows);
  return `
    <div class="card task-table-card">
      <div class="card-header">
        <span class="card-title">list (${sortedItems.length})</span>
      </div>
      ${sortedItems.length ? `
        <div class="task-table-wrap">
          <table class="task-table">
            <thead>
              <tr>
                <th>Task</th>
                <th>Owner</th>
                <th>Datum</th>
                <th></th>
              </tr>
            </thead>
            <tbody>
              ${sortedItems.map((item, index) => {
                const previousItem = index > 0 ? sortedItems[index - 1] : null;
                const startsDoneSection = item.status === 'done' && previousItem && previousItem.status !== 'done';
                return renderTaskTableRow(item, { startsDoneSection });
              }).join('')}
            </tbody>
          </table>
        </div>
      ` : `<div style="color:var(--text-muted);font-size:14px">Keine Einträge</div>`}
    </div>
  `;
}

function previewText(text, maxLength = 120) {
  if (!text) return '';
  const singleLine = String(text).replace(/\s+/g, ' ').trim();
  if (singleLine.length <= maxLength) return singleLine;
  return `${singleLine.slice(0, maxLength).trimEnd()}…`;
}

function renderTaskTableRow(item, options = {}) {
  const isDone = item.status === 'done';
  const isPastDue = !isDone && item.date && item.date < todayStr();
  const person = item.personId ? data.persons.find(entry => entry.id === item.personId) : null;
  const { startsDoneSection = false } = options;
  const notesPreview = previewText(item.notes);
  return `
    <tr class="${isDone ? 'is-done' : ''} ${isPastDue ? 'task-table-row-past-due' : ''} ${startsDoneSection ? 'task-table-done-start' : ''} task-table-row-${item.status}">
      <td class="task-table-task-cell" onclick="openEditItem('${item.id}')">
        <div class="task-table-task"><span class="task-status-dot task-status-dot-${item.status}" aria-hidden="true"></span>${esc(item.text)}</div>
        <div class="task-table-notes ${notesPreview ? '' : 'is-empty'}">${notesPreview ? esc(notesPreview) : ''}</div>
      </td>
      <td class="task-table-link">
        ${person ? `<button class="person-chip-button" onclick="openPersonById('${person.id}')">${personAvatar(person, 'sm')}<span>${esc(person.name)}</span></button>` : '<span class="task-table-muted">Niemand</span>'}
      </td>
      <td><span class="task-table-date ${isPastDue ? 'past-due' : ''}">${item.date ? formatDateShort(item.date) : ''}</span></td>
      <td class="task-table-actions">
        <div class="task-table-action-group">
          <div class="item-check ${isDone ? 'checked' : ''}" onclick="toggleItem('${item.id}')" title="Erledigt"></div>
          <button onclick="openEditItem('${item.id}')" title="Bearbeiten">&#9998;</button>
          <button onclick="deleteItem('${item.id}')" title="Löschen">&#x2715;</button>
        </div>
      </td>
    </tr>
  `;
}

function renderTaskSection(title, items, status) {
  return `
    <div class="card task-section task-${status}">
      <div class="card-header">
        <span class="card-title">${title} (${items.length})</span>
      </div>
      ${items.length ? `
        <ul class="item-list task-list">
          ${items.map(i => renderItem(i, false, { compact: true })).join('')}
        </ul>
      ` : `<div style="color:var(--text-muted);font-size:14px">Keine Einträge</div>`}
    </div>
  `;
}

function renderItem(item, draggable = false, options = {}) {
  const isDone = item.status === 'done';
  const isPastDue = !isDone && item.date && item.date < todayStr();
  const dateLabel = formatDateShort(item.date);
  const linkedMeeting = item.meetingId ? data.meetings.find(meeting => meeting.id === item.meetingId) : null;
  const { showStatus = false, compact = false } = options;
  const notesPreview = previewText(item.notes);
  const dragAttrs = draggable
    ? `draggable="true" ondragstart="onItemDragStart(event, '${item.id}')" ondragend="onItemDragEnd(event)"`
    : '';
  return `
    <li class="item ${isDone ? 'is-done' : ''} ${compact ? 'item-compact' : ''}" ${dragAttrs}>
      <div class="item-content" onclick="openEditItem('${item.id}')" style="cursor:pointer;">
        <div class="item-text ${isDone ? 'done' : ''}">${esc(item.text)}</div>
        ${notesPreview ? `<div class="item-notes">${esc(notesPreview)}</div>` : ''}
        <div class="item-meta">
          ${showStatus ? `<span class="badge badge-${item.status}">${item.status}</span>` : ''}
          ${item.personId ? `<button class="item-link-chip item-person-tag" onclick="event.stopPropagation();openPersonById('${item.personId}')">@${esc(personName(item.personId))}</button>` : ''}
          ${linkedMeeting ? `<button class="item-link-chip" onclick="event.stopPropagation();navigate('meetings:detail', {meetingId:'${linkedMeeting.id}'})">${meetingDisplayTitle(linkedMeeting)}</button>` : ''}
          ${isDone ? `<span class="badge badge-${item.type}">${itemTypeLabel(item.type)}</span>` : ''}
          ${dateLabel && !isDone ? `<span class="item-date ${isPastDue ? 'past-due' : ''}">${dateLabel}</span>` : ''}
        </div>
      </div>
      <div class="item-overlay">
        <div class="item-check ${isDone ? 'checked' : ''}" onclick="event.stopPropagation();toggleItem('${item.id}')" title="Erledigt"></div>
        <div class="item-actions">
          <button onclick="event.stopPropagation();openEditItem('${item.id}')" title="Bearbeiten">&#9998;</button>
          <button onclick="event.stopPropagation();deleteItem('${item.id}')" title="Löschen">&#x2715;</button>
        </div>
      </div>
    </li>
  `;
}

function changeMonth(dir) {
  const month = viewState.month || currentMonth();
  viewState.month = dir < 0 ? prevMonth(month) : nextMonth(month);
  render();
}

function setOverviewQuery(value) {
  const input = document.getElementById('overviewSearchInput');
  pendingOverviewSearchSelection = input
    ? { start: input.selectionStart, end: input.selectionEnd }
    : { start: value.length, end: value.length };
  viewState.overviewQuery = value;
  render();
}

function clearOverviewQuery() {
  viewState.overviewQuery = '';
  pendingOverviewSearchSelection = { start: 0, end: 0 };
  render();
}

function setOverviewLayout(layout) {
  const next = layout === 'board' ? 'board' : 'list';
  viewState.overviewLayout = next;
  try {
    localStorage.setItem(OVERVIEW_LAYOUT_KEY, next);
  } catch {}
  render();
}

function overviewLayout() {
  if (viewState.overviewLayout === 'board' || viewState.overviewLayout === 'list') {
    return viewState.overviewLayout;
  }
  try {
    const saved = localStorage.getItem(OVERVIEW_LAYOUT_KEY);
    return saved === 'board' ? 'board' : 'list';
  } catch {
    return 'list';
  }
}

</script>
<script data-source="./js/team.js">
// ============================================================
// TEAM VIEW
// ============================================================
function renderTeam() {

    ${teamPersons.length ? `

          <div class="card-header">
            <span class="card-title">Team (${teamPersons.length})</span>

	                  <div class="team-list-head">

        <section class="team-detail-panel card">

                <div class="team-detail-identity">
                  ${personAvatar(selectedPerson, 'lg')}
                  <div class="team-detail-copy">
	                    <div class="team-detail-name">
	                      ${esc(selectedPerson.name)}
	                    </div>
	                    ${sudo ? `<div class="team-detail-focus-line">
	                      <span class="team-detail-meta-label">Fokus</span>
	                      <strong class="team-detail-focus-value">${selectedPerson.pushDirection ? esc(selectedPerson.pushDirection) : 'Kein Fokus hinterlegt'}</strong>

	                    <div class="team-detail-links">

                <div class="team-detail-actions">

            <div class="team-section-block team-section-planung">
              ${renderPersonPlanungCard(selectedPerson)}

            <div class="team-detail-grid">
              <div class="team-section-block">
                <div class="card-header">
                  <span class="card-title">Offene Items (${selectedOpenItems.length})</span>
                </div>
                ${selectedOpenItems.length ? `
                  <ul class="item-list">
                    ${selectedOpenItems.slice(0, 8).map(item => renderItem(item, false, { compact: true })).join('')}

                <div class="card-header">

                </div>
                ${selectedMeetings.length ? `
                  <div class="team-meeting-list team-meeting-list-scroll">
                    ${selectedMeetings.map(meeting => `
                      <button class="team-meeting-row" onclick="navigate('meetings:detail', {meetingId:'${meeting.id}'})">
                        <span class="team-meeting-title">${meetingDisplayTitle(meeting)}</span>
                        <span class="team-meeting-date">${formatDate(meeting.date)}</span>
                      </button>
                    `).join('')}
                  </div>
                ` : '<div class="team-empty-copy">Noch keine Meetings</div>'}
              </div>
            </div>

	            ${sudo ? `<div class="team-section-block">
                <div class="card-header">
                  <span class="card-title">growth journal</span>
                  <span style="color:var(--text-muted);font-size:12px">30 Tage · +${selectedGrowthSignal.highlights} / -${selectedGrowthSignal.concerns}</span>

            <div class="empty-state">

      <div class="empty-state">
        <div class="empty-state-icon">&#128101;</div>
        <div class="empty-state-text">Noch keine Kontakte angelegt</div>
      </div>
    `}
  `;
}
